name: 외국인 수급 자동 업데이트

on:
  schedule:
    - cron: '35 6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: run: pip install requests

      - name: 크롤링 및 HTML 생성
        run: python scripts/fetch_foreign.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add foreign_flow.html
          git diff --staged --quiet || git commit -m "📈 외국인 수급 업데이트 $(date +'%Y-%m-%d')"
          git push
