var ZS=25, spd=0.85;
var ck=new Set(), st=new Set(), zOp=new Set(), zPl={}, repT={};
var fcZi=-1, fcCards=[], fcIdx=0, fcFlip=false, fcY=0, fcN=0;

function svCk(){try{localStorage.setItem('svb_ck',JSON.stringify([...ck]));localStorage.setItem('svb_st',JSON.stringify([...st]));}catch(e){}}
function ldCk(){try{var a=localStorage.getItem('svb_ck');if(a)ck=new Set(JSON.parse(a));var b=localStorage.getItem('svb_st');if(b)st=new Set(JSON.parse(b));}catch(e){}}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2200);}
function speak(w,r){if(!window.speechSynthesis)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=r||spd;speechSynthesis.speak(u);}
function updHd(){var d=ck.size,p=Math.round(d/W.length*100);document.getElementById('hd-pct').textContent=p+'%';document.getElementById('hd-fill').style.width=p+'%';}
function getW(id){return W.find(function(x){return x[0]===id;});}

// 탭
var TABS=['list','star','srch','flash','stat'];
TABS.forEach(function(tab){
  document.getElementById('t-'+tab).addEventListener('click',function(){
    TABS.forEach(function(t){
      document.getElementById('t-'+t).classList.toggle('on',t===tab);
      document.getElementById('sec-'+t).classList.toggle('on',t===tab);
    });
    if(tab==='list')renderList();
    else if(tab==='star')renderStar();
    else if(tab==='flash')renderFlash();
    else if(tab==='stat')renderStat();
  });
});

// ===== 구간학습 =====
function renderList(){
  var wrap=document.getElementById('sec-list');
  var totalZ=Math.ceil(W.length/ZS);
  var frag=document.createDocumentFragment();
  for(var zi=0;zi<totalZ;zi++){
    frag.appendChild(makeZoneCard(zi));
  }
  wrap.innerHTML='';
  wrap.appendChild(frag);
  updHd();
}

function makeZoneCard(zi){
  var s=zi*ZS, e=Math.min(s+ZS,W.length);
  var zw=W.slice(s,e);
  var dc=zw.filter(function(w){return ck.has(w[0]);}).length;
  var sc=zw.filter(function(w){return st.has(w[0]);}).length;
  var pct=Math.round(dc/zw.length*100);
  var isOp=zOp.has(zi);

  var card=document.createElement('div');
  card.className='zcard';

  var hd=document.createElement('div');
  hd.className='zhd';
  var left=document.createElement('div');
  left.innerHTML='<div class="zname">📌 '+(zi+1)+'구간</div><div class="zinfo">'+(s+1)+'~'+e+'번 · '+dc+'/'+zw.length+' 완료 ('+pct+'%)</div>';
  var meta=document.createElement('div');
  meta.className='zmeta';
  if(sc){var stag=document.createElement('span');stag.style.cssText='font-size:10px;color:#a78bfa;background:rgba(167,139,250,.12);padding:2px 6px;border-radius:8px';stag.textContent='⭐'+sc;meta.appendChild(stag);}
  var cntEl=document.createElement('span');cntEl.className='zcnt';cntEl.textContent=zw.length+'개';meta.appendChild(cntEl);
  var arrEl=document.createElement('span');arrEl.className='zarr'+(isOp?' op':'');arrEl.textContent='›';meta.appendChild(arrEl);
  hd.appendChild(left);hd.appendChild(meta);

  var body=document.createElement('div');
  body.className='zbody'+(isOp?' op':'');
  body.id='zb-'+zi;

  hd.addEventListener('click',function(){
    if(zOp.has(zi)){zOp.delete(zi);}else{zOp.add(zi);}
    body.classList.toggle('op',zOp.has(zi));
    arrEl.classList.toggle('op',zOp.has(zi));
    if(zOp.has(zi)){fillZoneBody(zi,body,zw);}
  });

  card.appendChild(hd);
  card.appendChild(body);
  if(isOp)fillZoneBody(zi,body,zw);
  return card;
}

function fillZoneBody(zi,body,zw){
  // 플레이어
  var pl=document.createElement('div');
  pl.className='player';
  pl.id='pl-'+zi;
  var cur=zPl[zi]&&zw[zPl[zi].idx];
  pl.innerHTML='<div class="pl-lbl">🔊 구간 자동재생</div>'
    +'<div class="pl-w">'+(cur?cur[1]:'')+'</div>'
    +'<div class="pl-p">'+(cur?cur[2]:'')+'</div>'
    +'<div class="pl-m">'+(cur?cur[3]:'')+'</div>'
    +'<div class="pl-btns"></div>'
    +'<div class="pl-spd"></div>'
    +'<div class="pl-pg">'+(zPl[zi]?((zPl[zi].idx+1)+'/'+zw.length):'')+'</div>';

  var btns=pl.querySelector('.pl-btns');
  var b1=document.createElement('button');b1.className='plb'+(zPl[zi]&&zPl[zi].active?' on':'');b1.textContent='▶ 자동재생';
  b1.addEventListener('click',function(){playZone(zi,spd,zw,body);});
  var b2=document.createElement('button');b2.className='plb';b2.textContent='🐢 천천히';
  b2.addEventListener('click',function(){playZone(zi,0.55,zw,body);});
  btns.appendChild(b1);btns.appendChild(b2);

  var spdWrap=pl.querySelector('.pl-spd');
  [['1.1','빠르게'],['0.85','보통'],['0.65','천천히'],['0.45','아주천천히']].forEach(function(sp){
    var sb=document.createElement('button');
    sb.className='spdbt'+(spd===parseFloat(sp[0])?' on':'');
    sb.textContent=sp[1];
    sb.addEventListener('click',function(){spd=parseFloat(sp[0]);toast('속도: '+sp[1]);});
    spdWrap.appendChild(sb);
  });

  body.innerHTML='';
  body.appendChild(pl);

  // 단어 목록
  zw.forEach(function(w){
    var row=document.createElement('div');
    row.className='wrow';
    var main=document.createElement('div');main.className='wmain';
    main.innerHTML='<div class="wno">#'+w[0]+'</div><div class="ww">'+w[1]+'</div><div class="wpr">'+w[2]+'</div><div class="wme">'+w[3]+'</div>';
    var acts=document.createElement('div');acts.className='wacts';

    var bSp=document.createElement('button');bSp.className='wa';bSp.textContent='🔊';
    bSp.addEventListener('click',function(){speak(w[1]);});

    var bRp=document.createElement('button');bRp.className='wa'+(repT[w[0]]?' rp':'');bRp.textContent=repT[w[0]]?'⏹':'🔁';
    bRp.addEventListener('click',function(){
      if(repT[w[0]]){clearInterval(repT[w[0]]);delete repT[w[0]];bRp.className='wa';bRp.textContent='🔁';}
      else{speak(w[1]);repT[w[0]]=setInterval(function(){speak(w[1]);},3500);bRp.className='wa rp';bRp.textContent='⏹';toast('🔁 반복 재생');}
    });

    var bSt=document.createElement('button');bSt.className='wst';bSt.textContent=st.has(w[0])?'⭐':'☆';
    bSt.addEventListener('click',function(){
      if(st.has(w[0])){st.delete(w[0]);bSt.textContent='☆';toast('제거됐어요');}
      else{st.add(w[0]);bSt.textContent='⭐';toast('⭐ 암기함 추가!');}
      svCk();
    });

    var bCk=document.createElement('button');bCk.className='wck'+(ck.has(w[0])?' on':'');bCk.textContent=ck.has(w[0])?'✓':'○';
    bCk.addEventListener('click',function(){
      if(ck.has(w[0])){ck.delete(w[0]);bCk.className='wck';bCk.textContent='○';}
      else{ck.add(w[0]);bCk.className='wck on';bCk.textContent='✓';}
      svCk();updHd();
    });

    acts.appendChild(bSp);acts.appendChild(bRp);acts.appendChild(bSt);acts.appendChild(bCk);
    row.appendChild(main);row.appendChild(acts);
    body.appendChild(row);
  });
}

function playZone(zi,rate,zw,body){
  if(zPl[zi]&&zPl[zi].active){
    zPl[zi].active=false;speechSynthesis.cancel();delete zPl[zi];
    var b=document.querySelector('#zb-'+zi+' .plb.on');if(b){b.classList.remove('on');b.textContent='▶ 자동재생';}
    toast('⏹ 중지');return;
  }
  if(!zw){var s=zi*ZS,e=Math.min(s+ZS,W.length);zw=W.slice(s,e);}
  var idx=0;zPl[zi]={active:true,idx:0};
  var pl=document.getElementById('pl-'+zi);
  if(pl){var b=pl.querySelectorAll('.plb')[0];if(b){b.classList.add('on');b.textContent='⏹ 중지';}}
  function next(){
    if(!zPl[zi]||!zPl[zi].active)return;
    if(idx>=zw.length){delete zPl[zi];toast('✅ 완료!');var b=document.querySelector('#pl-'+zi+' .plb.on');if(b){b.classList.remove('on');b.textContent='▶ 자동재생';}return;}
    zPl[zi].idx=idx;
    var pl2=document.getElementById('pl-'+zi);
    if(pl2){pl2.querySelector('.pl-w').textContent=zw[idx][1];pl2.querySelector('.pl-p').textContent=zw[idx][2];pl2.querySelector('.pl-m').textContent=zw[idx][3];pl2.querySelector('.pl-pg').textContent=(idx+1)+'/'+zw.length;}
    var u=new SpeechSynthesisUtterance(zw[idx][1]);u.lang='en-US';u.rate=rate;
    u.onend=function(){if(zPl[zi]&&zPl[zi].active)setTimeout(function(){idx++;next();},1200);};
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
  next();toast('▶ 재생 시작');
}

    var ub=c.querySelector('.ubtns');

    b3.addEventListener('click',function(){st.delete(w[0]);svCk();renderStar();toast('제거됐어요');});
    ub.appendChild(b1);ub.appendChild(b2);ub.appendChild(b3);
    wrap.appendChild(c);

}

// ===== 검색 =====
document.getElementById('si').addEventListener('input',doSearch);
document.getElementById('sx').addEventListener('click',function(){document.getElementById('si').value='';doSearch();});
function doSearch(){
  var q=document.getElementById('si').value.trim().toLowerCase();
  var res=document.getElementById('sr'),cnt=document.getElementById('sc');
  res.innerHTML='';cnt.textContent='';
  if(!q)return;
  var found=W.filter(function(w){return w[1].toLowerCase().indexOf(q)>=0||w[3].indexOf(q)>=0;});
  cnt.textContent='검색 결과: '+found.length+'개';
  if(!found.length){res.innerHTML='<div class="empty"><span class="ei">🔍</span>결과 없음</div>';return;}
  var frag=document.createDocumentFragment();
  var show=found.slice(0,100);
  show.forEach(function(w){
    var row=document.createElement('div');
    row.className='wrow';
    row.style.cssText='background:#110d1e;border-radius:10px;margin-bottom:6px;border:1px solid #2a1e4a';
    var main=document.createElement('div');main.className='wmain';
    main.innerHTML='<div class="wno">#'+w[0]+'</div><div class="ww">'+w[1]+'</div><div class="wpr">'+w[2]+'</div><div class="wme">'+w[3]+'</div>';
    var acts=document.createElement('div');acts.className='wacts';
    var b1=document.createElement('button');b1.className='wa';b1.textContent='🔊';b1.addEventListener('click',function(){speak(w[1]);});
    var b2=document.createElement('button');b2.className='wst';b2.textContent=st.has(w[0])?'⭐':'☆';
    b2.addEventListener('click',function(){if(st.has(w[0])){st.delete(w[0]);b2.textContent='☆';}else{st.add(w[0]);b2.textContent='⭐';}svCk();});
    var b3=document.createElement('button');b3.className='wck'+(ck.has(w[0])?' on':'');b3.textContent=ck.has(w[0])?'✓':'○';
    b3.addEventListener('click',function(){if(ck.has(w[0])){ck.delete(w[0]);b3.className='wck';b3.textContent='○';}else{ck.add(w[0]);b3.className='wck on';b3.textContent='✓';}svCk();updHd();});
    acts.appendChild(b1);acts.appendChild(b2);acts.appendChild(b3);
    row.appendChild(main);row.appendChild(acts);
    frag.appendChild(row);
  });
  if(found.length>100){var more=document.createElement('div');more.style.cssText='text-align:center;color:#7c5cbf;font-size:12px;padding:8px';more.textContent='... '+(found.length-100)+'개 더 있어요';frag.appendChild(more);}
  res.appendChild(frag);
}

// ===== 플래시카드 =====
function renderFlash(){
  var wrap=document.getElementById('sec-flash');
  wrap.innerHTML='';
  var totalZ=Math.ceil(W.length/ZS);

  var sel=document.createElement('div');sel.className='fc-sel';
  var tit=document.createElement('div');tit.className='fc-tit';tit.textContent='🃏 플래시카드 — 구간 선택';sel.appendChild(tit);

  var grid=document.createElement('div');grid.className='fc-grid';
  for(var zi=0;zi<totalZ;zi++){
    var s=zi*ZS,e=Math.min(s+ZS,W.length);
    var btn=document.createElement('button');
    btn.className='fc-gb'+(fcZi===zi?' on':'');
    btn.textContent=(zi+1)+'구간';
    var sub=document.createElement('span');sub.style.cssText='display:block;font-size:9px;margin-top:2px';sub.textContent=(s+1)+'~'+e;
    btn.appendChild(sub);
    ;(function(z,b){
      b.addEventListener('click',function(){
        fcZi=z;
        grid.querySelectorAll('.fc-gb').forEach(function(x,i){x.classList.toggle('on',i===z);});
      });
    })(zi,btn);
    grid.appendChild(btn);
  }
  sel.appendChild(grid);

  var goBtn=document.createElement('button');goBtn.className='fc-go';goBtn.textContent='▶ 시작하기';
  goBtn.addEventListener('click',startFlash);
  sel.appendChild(goBtn);

  var game=document.createElement('div');game.id='fc-game';
  wrap.appendChild(sel);
  wrap.appendChild(game);
}

function startFlash(){
  if(fcZi<0){toast('구간을 먼저 선택해주세요');return;}
  var s=fcZi*ZS,e=Math.min(s+ZS,W.length);
  fcCards=W.slice(s,e).slice();
  for(var i=fcCards.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=fcCards[i];fcCards[i]=fcCards[j];fcCards[j]=tmp;}
  fcIdx=0;fcFlip=false;fcY=0;fcN=0;
  renderFcCard();
}

function renderFcCard(){
  var game=document.getElementById('fc-game');
  if(!game)return;
  game.innerHTML='';

  if(fcIdx>=fcCards.length){
    var pct=Math.round(fcY/fcCards.length*100);
    var col=pct>=80?'#6aff6a':pct>=60?'#ffb347':'#ff6b6b';
    var res=document.createElement('div');res.className='fc-res';
    var t=document.createElement('div');t.className='fc-res-t';t.textContent='🎉 완료!';
    var sc=document.createElement('div');sc.className='fc-res-s';sc.style.color=col;sc.textContent=pct+'%';
    var de=document.createElement('div');de.className='fc-res-d';de.textContent='✅ '+fcY+'개 알아요  ❌ '+fcN+'개 몰라요';
    var de2=document.createElement('div');de2.style.cssText='font-size:11px;color:#5b3fa0';de2.textContent='모르는 단어는 ⭐ 암기함에 추가됐어요';
    var rbs=document.createElement('div');rbs.className='fc-res-btns';
    var rb1=document.createElement('button');rb1.className='fc-res-btn';rb1.style.cssText='background:#5b21b6;color:#fff';rb1.textContent='🔄 다시하기';rb1.addEventListener('click',startFlash);
    var rb2=document.createElement('button');rb2.className='fc-res-btn';rb2.style.cssText='background:#150e2a;border:1px solid #2a1e4a;color:#a78bfa';rb2.textContent='← 구간선택';rb2.addEventListener('click',renderFlash);
    rbs.appendChild(rb1);rbs.appendChild(rb2);
    res.appendChild(t);res.appendChild(sc);res.appendChild(de);res.appendChild(de2);res.appendChild(rbs);
    game.appendChild(res);
    return;
  }

  var w=fcCards[fcIdx];
  var pct2=Math.round(fcIdx/fcCards.length*100);

  var pg=document.createElement('div');pg.className='fc-prg';
  var pgL=document.createElement('span');pgL.textContent=(fcIdx+1)+'/'+fcCards.length;
  var pgR=document.createElement('span');pgR.innerHTML='<span style="color:#6aff6a">✅'+fcY+'</span> <span style="color:#ff6b6b">❌'+fcN+'</span>';
  pg.appendChild(pgL);pg.appendChild(pgR);

  var pb=document.createElement('div');pb.className='fc-pb';
  var pf=document.createElement('div');pf.className='fc-pf';pf.style.width=pct2+'%';
  pb.appendChild(pf);

  var cw=document.createElement('div');cw.className='cw';
  var card=document.createElement('div');card.className='card'+(fcFlip?' flip':'');

  var cf=document.createElement('div');cf.className='cf';
  var cno=document.createElement('div');cno.className='c-no';cno.textContent='#'+w[0]+' · '+(fcZi+1)+'구간';
  var cw2=document.createElement('div');cw2.className='c-w';cw2.textContent=w[1];
  var cp=document.createElement('div');cp.className='c-p';cp.textContent=w[2];
  var ch=document.createElement('div');ch.className='c-hint';ch.textContent='탭하면 뜻이 보여요 👆';
  cf.appendChild(cno);cf.appendChild(cw2);cf.appendChild(cp);cf.appendChild(ch);

  var cb=document.createElement('div');cb.className='cb';
  var cno2=document.createElement('div');cno2.className='c-no';cno2.textContent='#'+w[0];
  var cw3=document.createElement('div');cw3.className='c-w';cw3.style.fontSize='20px';cw3.textContent=w[1];
  var cp2=document.createElement('div');cp2.className='c-p';cp2.textContent=w[2];
  var cm=document.createElement('div');cm.className='c-m';cm.textContent=w[3];
  cb.appendChild(cno2);cb.appendChild(cw3);cb.appendChild(cp2);cb.appendChild(cm);

  card.appendChild(cf);card.appendChild(cb);
  card.addEventListener('click',function(){fcFlip=!fcFlip;card.classList.toggle('flip',fcFlip);if(fcFlip)speak(w[1]);});
  cw.appendChild(card);

  var btns=document.createElement('div');btns.className='fc-btns';
  var bN=document.createElement('button');bN.className='fc-no';bN.textContent='❌ 몰라요';
  bN.addEventListener('click',function(){st.add(w[0]);svCk();fcN++;fcIdx++;fcFlip=false;renderFcCard();});
  var bS=document.createElement('button');bS.className='fc-sp';bS.textContent='🔊';
  bS.addEventListener('click',function(){speak(w[1]);});
  var bY=document.createElement('button');bY.className='fc-yes';bY.textContent='✅ 알아요';
  bY.addEventListener('click',function(){fcY++;fcIdx++;fcFlip=false;renderFcCard();});
  btns.appendChild(bN);btns.appendChild(bS);btns.appendChild(bY);

  var bk=document.createElement('div');bk.className='fc-bk';
  var bkb=document.createElement('button');bkb.textContent='← 구간 선택';bkb.addEventListener('click',function(){renderFlash();});
  bk.appendChild(bkb);

  game.appendChild(pg);game.appendChild(pb);game.appendChild(cw);game.appendChild(btns);game.appendChild(bk);
}

// ===== 통계 =====
function renderStat(){
  var wrap=document.getElementById('sec-stat');
  var total=W.length,done=ck.size,star=st.size,pct=Math.round(done/total*100);
  var totalZ=Math.ceil(total/ZS);
  wrap.innerHTML='<div class="st-grid">'
    +'<div class="st-box"><div class="st-l">전체 단어</div><div class="st-v">'+total.toLocaleString()+'</div><div class="st-s">개</div></div>'
    +'<div class="st-box"><div class="st-l">학습 완료</div><div class="st-v">'+done+'</div><div class="st-s">'+pct+'%</div></div>'
    +'<div class="st-box"><div class="st-l">암기함</div><div class="st-v" style="color:#a78bfa">'+star+'</div><div class="st-s">개</div></div>'
    +'<div class="st-box"><div class="st-l">총 구간</div><div class="st-v">'+totalZ+'</div><div class="st-s">구간</div></div>'
    +'</div>'
    +'<div class="st-pr"><span style="color:#a78bfa;font-weight:600">전체 진도</span><span>'+pct+'%</span></div>'
    +'<div class="st-pb" style="height:10px;margin-bottom:16px"><div class="st-pf" style="width:'+pct+'%"></div></div>';
  for(var zi=0;zi<Math.min(totalZ,20);zi++){
    var s=zi*ZS,e=Math.min(s+ZS,total);
    var zw=W.slice(s,e);
    var dc=zw.filter(function(w){return ck.has(w[0]);}).length;
    var zp=Math.round(dc/zw.length*100);
    wrap.innerHTML+='<div class="st-pr"><span>'+(zi+1)+'구간 ('+(s+1)+'~'+e+')</span><span>'+dc+'/'+zw.length+' ('+zp+'%)</span></div>'
      +'<div class="st-pb"><div class="st-pf" style="width:'+zp+'%"></div></div>';
  }
  if(totalZ>20)wrap.innerHTML+='<div style="text-align:center;font-size:11px;color:#7c5cbf;padding:6px">... 전체 '+totalZ+'구간</div>';
}

ldCk();
zOp.add(0);
renderList();
