    {word:"use",phonetic:"[juːz]",meaning:"착취하다",pos:"v"},
    {word:"scarce",phonetic:"[skers]",meaning:"부족한, 희귀한",pos:"a"},
    {word:"rare",phonetic:"[rer]",meaning:"희귀한",pos:"a"},
    {word:"insufficient",phonetic:"[ˌɪnsəˈfɪʃnt]",meaning:"부족한",pos:"a"},
    {word:"abundant",phonetic:"[əˈbʌndənt]",meaning:"풍부한 (부족한의 반대)",pos:"a"},
    {word:"resource",phonetic:"[ˈriːsɔːrs]",meaning:"자원",pos:"n"},
    {word:"compete",phonetic:"[kəmˈpiːt]",meaning:"경쟁하다",pos:"v"},
    {word:"contend",phonetic:"[kənˈtend]",meaning:"경쟁하다",pos:"v"},
    {word:"vie",phonetic:"[vaɪ]",meaning:"경쟁하다",pos:"v"},
    {word:"advantage",phonetic:"[ədˈvæntɪdʒ]",meaning:"이점, 우위",pos:"n"},
    {word:"benefit",phonetic:"[ˈbenɪfɪt]",meaning:"이점",pos:"n"},
    {word:"disadvantage",phonetic:"[ˌædvənˈteɪdʒɪdʒ]",meaning:"불이익 (이점의 반대)",pos:"n"},
    {word:"specialization",phonetic:"[ˌspeʃəlaɪˈzeɪʃn]",meaning:"전화, 특수화",pos:"n"},
    {word:"diversity",phonetic:"[daɪˈvɜːrsəti]",meaning:"다양성",pos:"n"},
    {word:"variety",phonetic:"[vəˈraɪəti]",meaning:"다양성",pos:"n"},
    {word:"niche",phonetic:"[nɪtʃ]",meaning:"생태적 지위, 틈새",pos:"n"},
    {word:"coexist",phonetic:"[ˌkoʊɪɡˈzɪst]",meaning:"공존하다",pos:"v"}
  ];

  // System State
  let words = [];
  let currentTab = 'list';
  let currentRange = 'all'; // 'all' or index integer
  let currentFilter = 'all'; // 'all', 'wrong', 'fav'
  let flashIndex = 0;
  let flashShowMeaning = false;
  let quizData = [];
  let quizIndex = 0;
  let quizScore = 0;

  // Touch state for Swipe
  let touchStartX = 0;
  let touchEndX = 0;

  // Initialize LocalStorage Data
  function initData() {
    const localFav = JSON.parse(localStorage.getItem('cu_fav') || '{}');
    const localStatus = JSON.parse(localStorage.getItem('cu_status') || '{}');
    
    // Explicit wrapper closure for spread operation safely
    words = rawWords.map((w, index) => ({
      ...w,
      id: index,
      fav: !!localFav[index],
      status: localStatus[index] || '' // 'know', 'wrong', ''
    }));
  }

  function saveState() {
    const localFav = {};
    const localStatus = {};
    words.forEach(w => {
      if(w.fav) localFav[w.id] = true;
      if(w.status) localStatus[w.id] = w.status;
    });
    localStorage.setItem('cu_fav', JSON.stringify(localFav));
    localStorage.setItem('cu_status', JSON.stringify(localStatus));
  }

  // Generate Range Buttons (10 units)
  function renderRangeBar() {
    const container = document.getElementById('rangeBar');
    container.innerHTML = '';

    // '전체' Button
    const btnAll = document.createElement('button');
    btnAll.className = `range-btn ${currentRange === 'all' ? 'active' : ''}`;
    btnAll.innerText = '전체 보기';
    btnAll.onclick = () => setRange('all');
    container.appendChild(btnAll);

    // Dynamic chunks of 10
    const chunkSize = 10;
    const totalChunks = Math.ceil(words.length / chunkSize);
    
    for (let i = 0; i < totalChunks; i++) {
      const start = i * chunkSize + 1;
      const end = Math.min((i + 1) * chunkSize, words.length);
      const btn = document.createElement('button');
      btn.className = `range-btn ${currentRange === i ? 'active' : ''}`;
      btn.innerText = `${start}-${end}`;
      btn.onclick = () => setRange(i);
      container.appendChild(btn);
    }
  }

  // Get current active filtered subset matching Range & Status Filters
  function getFilteredDataset() {
    let subset = words;
    
    // 1. Range Filtering
    if (currentRange !== 'all') {
      const start = currentRange * 10;
      const end = start + 10;
      subset = subset.slice(start, end);
    }
    
    // 2. Status Filtering (List specific mostly, but shared statewise if required)
    if (currentFilter === 'fav') {
      subset = subset.filter(w => w.fav);
    } else if (currentFilter === 'wrong') {
      subset = subset.filter(w => w.status === 'wrong');
    }

    // 3. Search Term Filter (Only active on Word List tab)
    if (currentTab === 'list') {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (query) {
        subset = subset.filter(w => w.word.toLowerCase().includes(query) || w.meaning.toLowerCase().includes(query));
      }
    }

    return subset;
  }

  function setRange(rangeIndex) {
    currentRange = rangeIndex;
    renderRangeBar();
    refreshView();
  }

  function setFilter(filterType) {
    currentFilter = filterType;
    document.getElementById('filterAll').className = `filter-btn ${filterType === 'all' ? 'active' : ''}`;
    document.getElementById('filterWrong').className = `filter-btn ${filterType === 'wrong' ? 'active' : ''}`;
    document.getElementById('filterFav').className = `filter-btn ${filterType === 'fav' ? 'active' : ''}`;
    renderList();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    // Style active link
    event.target.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');

    // UI visibility controls toggle
    const filterRow = document.getElementById('filterRow');
    if (tab === 'list') {
      filterRow.style.display = 'flex';
    } else {
      filterRow.style.display = 'none';
    }

    // Tab view resets
    if (tab === 'flash') {
      flashIndex = 0;
      flashShowMeaning = false;
    } else if (tab === 'quiz') {
      initQuiz();
    }

    refreshView();
  }

  function refreshView() {
    if (currentTab === 'list') renderList();
    if (currentTab === 'flash') renderFlashcard();
    if (currentTab === 'quiz' && quizData.length > 0) renderQuizCard();
  }

  // Speak Word via Web Speech API tts
  function speak(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.85;
      window.speechSynthesis.speak(utterance);
    }
  }

  // --- 1. WORD LIST CONTROLLER ---
  function renderList() {
    const container = document.getElementById('wordListContainer');
    const dataset = getFilteredDataset();
    container.innerHTML = '';

    if (dataset.length === 0) {
      container.innerHTML = '<div class="empty-msg">해당되는 단어가 없습니다.</div>';
      return;
    }

    dataset.forEach(w => {
      const item = document.createElement('div');
      item.className = `word-item ${w.status === 'know' ? 'memorized' : ''}`;
      item.innerHTML = `
        <div class="word-info">
          <div class="word-top">
            <span class="word-pos">${w.pos}</span>
            <span class="word-text">${w.word}</span>
            <span class="word-phonetic">${w.phonetic}</span>
          </div>
          <div class="word-meaning">${w.meaning}</div>
        </div>
        <div class="word-actions">
          <button class="action-btn" onclick="speak('${w.word.replace(/'/g, "\\'")}')">🔊</button>
          <button class="action-btn fav ${w.fav ? 'active' : ''}" onclick="toggleFav(${w.id})">⭐</button>
          <button class="action-btn check ${w.status === 'know' ? 'active' : ''}" onclick="toggleStatus(${w.id}, 'know')">✔</button>
          <button class="action-btn" style="color: ${w.status === 'wrong' ? '#EF4444' : '#9CA3AF'}" onclick="toggleStatus(${w.id}, 'wrong')">❌</button>
        </div>
      `;
      container.appendChild(item);
    });
  }

  function toggleFav(id) {
    words[id].fav = !words[id].fav;
    saveState();
    refreshView();
  }

  function toggleStatus(id, state) {
    if (words[id].status === state) {
      words[id].status = '';
    } else {
      words[id].status = state;
    }
    saveState();
    refreshView();
  }

  // --- 2. FLASHCARD CONTROLLER ---
  function renderFlashcard() {
    const container = document.getElementById('flashcardWrapper');
    const dataset = getFilteredDataset();
    container.innerHTML = '';

    if (dataset.length === 0) {
      container.innerHTML = '<div class="empty-msg">구간 내 조건에 부합하는 단어가 없습니다.</div>';
      return;
    }

    if (flashIndex >= dataset.length) flashIndex = 0;
    const currentWord = dataset[flashIndex];

    const card = document.createElement('div');
    card.className = 'flashcard';
    card.onclick = () => {
      flashShowMeaning = true;
      document.getElementById('fcMeaningArea').innerText = currentWord.meaning;
      speak(currentWord.word);
    };

    card.innerHTML = `
      <button class="fc-star ${currentWord.fav ? 'active' : ''}" id="fcStarIcon">⭐</button>
      <button class="fc-audio-btn" id="fcAudioBtn">🔊</button>
      <div class="fc-pos">${currentWord.pos}</div>
      <div class="fc-word">${currentWord.word}</div>
      <div class="fc-phonetic">${currentWord.phonetic}</div>
      <div class="fc-meaning" id="fcMeaningArea">${flashShowMeaning ? currentWord.meaning : ''}</div>
      <div class="fc-hint">${flashShowMeaning ? '' : '💡 카드를 터치하면 뜻과 발음이 나옵니다.'}</div>
      <div class="fc-nav-desc">(${flashIndex + 1} / ${dataset.length}) Swipe 좌우 이동 가능</div>
    `;

    // Audio Event Stop propagation setup
    card.querySelector('#fcAudioBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      speak(currentWord.word);
    });

    // Star Event Stop propagation setup
    card.querySelector('#fcStarIcon').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(currentWord.id);
    });

    // Swipe Event Triggers
    card.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, false);
    card.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe(dataset.length);
    }, false);

    const btnRow = document.createElement('div');
    btnRow.className = 'fc-btn-row';
    btnRow.innerHTML = `
      <button class="fc-action-btn" onclick="handleFlashAction(${currentWord.id}, 'wrong')">아직 모름 ❌</button>
      <button class="fc-action-btn know" onclick="handleFlashAction(${currentWord.id}, 'know')">외웠음 ✔</button>
    `;

    container.appendChild(card);
    container.appendChild(btnRow);
  }

  function handleSwipe(maxLen) {
    if (touchStartX - touchEndX > 50) { // Swipe Left -> Next
      flashIndex = (flashIndex + 1) % maxLen;
      flashShowMeaning = false;
      renderFlashcard();
    }
    if (touchEndX - touchStartX > 50) { // Swipe Right -> Prev
      flashIndex = (flashIndex - 1 + maxLen) % maxLen;
      flashShowMeaning = false;
      renderFlashcard();
    }
  }

  function handleFlashAction(id, state) {
    words[id].status = state;
    saveState();
    
    const dataset = getFilteredDataset();
    flashIndex = (flashIndex + 1) % dataset.length;
    flashShowMeaning = false;
    renderFlashcard();
  }

  // --- 3. QUIZ CONTROLLER ---
  function initQuiz() {
    const dataset = getFilteredDataset();
    if (dataset.length < 4) {
      quizData = [];
      return;
    }
    
    // Shuffle and pick max 10
    const shuffled = [...dataset].sort(() => 0.5 - Math.random());
    quizData = shuffled.slice(0, Math.min(10, shuffled.length));
    quizIndex = 0;
    quizScore = 0;
  }

  function renderQuizCard() {
    const container = document.getElementById('quizWrapper');
    container.innerHTML = '';

    if (quizData.length === 0) {
      container.innerHTML = '<div class="empty-msg">퀴즈를 출제하려면 최소 4개 이상의 단어가 선택 범위 내에 필요합니다. 구간 범위를 늘려주세요.</div>';
      return;
    }

    if (quizIndex >= quizData.length) {
      // Quiz Finished Result Screen
      let emoji = '🥇';
      let msg = '완벽합니다! 아주 훌륭한 실력이에요.';
      const percent = (quizScore / quizData.length) * 100;
      if(percent < 60) { emoji = '🔥'; msg = '틀린 단어들을 단어목록에서 다시 한 번 확인하고 재도전 해보세요!'; }
      else if(percent < 90) { emoji = '✨'; msg = '좋은 점수입니다! 조금만 더 하면 다 맞출 수 있어요.'; }

      container.innerHTML = `
        <div class="quiz-result">
          <div style="font-size: 50px;">${emoji}</div>
          <div class="score">${quizScore} / ${quizData.length}</div>
          <div class="feedback">${msg}</div>
          <button class="retry-btn" onclick="initQuiz(); renderQuizCard();">다시 도전하기</button>
        </div>
      `;
      return;
    }

    const currentQuiz = quizData[quizIndex];
    
    // Generate Options
    let options = [currentQuiz.meaning];
    while(options.length < 4) {
      const randWord = words[Math.floor(Math.random() * words.length)];
      if(!options.includes(randWord.meaning)) {
        options.push(randWord.meaning);
      }
    }
    options.sort(() => 0.5 - Math.random());

    container.innerHTML = `
      <div class="quiz-progress">
        <span>진행도: ${quizIndex + 1} / ${quizData.length}</span>
        <span>맞춘 개수: ${quizScore}</span>
      </div>
      <div class="quiz-word-box">
        <div class="quiz-word">${currentQuiz.word}</div>
        <div style="color:var(--text-muted); font-size:13px;">${currentQuiz.phonetic}</div>
      </div>
      <div class="quiz-options">
        ${options.map(opt => `<button class="quiz-opt" onclick="checkQuizAnswer(this, '${opt.replace(/'/g, "\\'")}', '${currentQuiz.meaning.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
      </div>
    `;

    // TTS autoplay on question load
    setTimeout(() => speak(currentQuiz.word), 100);
  }

  function checkQuizAnswer(btnElement, chosen, correct) {
    const options = document.querySelectorAll('.quiz-opt');
    options.forEach(btn => btn.disabled = true); // click lock

    if (chosen === correct) {
      btnElement.classList.add('correct');
      quizScore++;
    } else {
      btnElement.classList.add('wrong');
      options.forEach(btn => {
        if(btn.innerText === correct) btn.classList.add('correct');
      });
      // Mark as wrong auto
      const idx = words.findIndex(w => w.meaning === correct);
      if(idx !== -1) { words[idx].status = 'wrong'; saveState(); }
    }

    setTimeout(() => {
      quizIndex++;
      renderQuizCard();
    }, 1200);
  }

  // Application Bootcamp
  window.onload = () => {
    initData();
    renderRangeBar();
    renderList();
  };
</script>

</body>
</html>
