<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 워크시트 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; color: #1a1a1a; }

.topbar { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo { width: 28px; height: 28px; background: #534AB7; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; }
.app-name { font-size: 15px; font-weight: 600; }
.api-wrap { display: flex; align-items: center; gap: 8px; }
.api-label { font-size: 12px; color: #888; white-space: nowrap; }
.api-input { padding: 6px 10px; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; width: 280px; background: #fafafa; color: #333; font-family: monospace; }
.api-input:focus { outline: none; border-color: #534AB7; background: #fff; }
.save-btn { padding: 6px 12px; font-size: 12px; border: 1px solid #534AB7; border-radius: 7px; background: #EEEDFE; color: #3C3489; cursor: pointer; white-space: nowrap; font-weight: 500; }
.save-btn:hover { background: #534AB7; color: #fff; }
.save-badge { font-size: 11px; color: #0F6E56; background: #E1F5EE; padding: 3px 8px; border-radius: 20px; display: none; }

.layout { display: grid; grid-template-columns: 290px 1fr; height: calc(100vh - 52px); }

.sidebar { background: #fff; border-right: 1px solid #e5e5e0; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
.sec-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }

textarea.passage { width: 100%; resize: none; font-size: 13px; font-family: inherit; border: 1px solid #e0e0e0; border-radius: 8px; padding: 9px; background: #fafafa; color: #1a1a1a; min-height: 180px; line-height: 1.6; }
textarea.passage:focus { outline: none; border-color: #534AB7; background: #fff; box-shadow: 0 0 0 3px rgba(83,74,183,0.08); }
.char-count { font-size: 11px; color: #bbb; text-align: right; margin-top: 3px; }

.pill-row { display: flex; gap: 5px; flex-wrap: wrap; }
.pill { padding: 5px 11px; font-size: 12px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; }
.pill:hover { border-color: #999; }
.pill.active { border-color: #0F6E56; background: #E1F5EE; color: #0F6E56; font-weight: 500; }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.type-btn { padding: 7px 6px; font-size: 11.5px; border: 1px solid #e0e0e0; border-radius: 7px; background: #fafafa; color: #555; cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3; }
.type-btn:hover { background: #f0f0f0; }
.type-btn.active { border-color: #534AB7; background: #EEEDFE; color: #3C3489; font-weight: 500; }

.gen-btn { padding: 11px; font-size: 13px; font-weight: 600; border: none; border-radius: 9px; background: #534AB7; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; box-shadow: 0 2px 8px rgba(83,74,183,0.25); transition: all 0.15s; }
.gen-btn:hover { background: #3C3489; }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.main { display: flex; flex-direction: column; overflow: hidden; }
.main-header { padding: 12px 20px; border-bottom: 1px solid #e5e5e0; display: flex; align-items: center; justify-content: space-between; background: #fff; }
.main-title { font-size: 14px; font-weight: 600; }
.toolbar { display: flex; gap: 6px; }
.tool-btn { padding: 6px 11px; font-size: 12px; border: 1px solid #ddd; border-radius: 7px; background: #fff; color: #444; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.tool-btn:hover { background: #f5f4f0; }

.tab-row { display: flex; border-bottom: 1px solid #e5e5e0; background: #fff; }
.tab { padding: 9px 16px; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab:hover { color: #444; }
.tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: 500; }

.output-area { flex: 1; overflow-y: auto; padding: 1.25rem 1.75rem; }

.placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: #ccc; }
.placeholder i { font-size: 44px; }
.placeholder p { font-size: 14px; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 16px; }
.spinner { width: 30px; height: 30px; border: 2px solid #e0e0e0; border-top-color: #534AB7; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: #888; }

.worksheet { display: flex; flex-direction: column; gap: 1.1rem; max-width: 820px; }
.ws-sec { border: 1px solid #e5e5e0; border-radius: 10px; overflow: hidden; background: #fff; }
.ws-head { padding: 9px 14px; background: #f8f7fb; border-bottom: 1px solid #e5e5e0; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; color: #3C3489; }
.ws-head i { font-size: 15px; }
.ws-body { padding: 14px 16px; font-size: 13px; line-height: 1.8; color: #1a1a1a; }
.ws-body ol, .ws-body ul { padding-left: 1.2rem; }
.ws-body li { margin-bottom: 5px; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.card-sm { padding: 8px 10px; background: #f8f7fb; border-radius: 7px; border: 1px solid #eeedf8; }
.card-sm-label { font-size: 11px; color: #534AB7; font-weight: 600; margin-bottom: 2px; }
.card-sm-val { font-size: 12px; line-height: 1.5; color: #333; }

.vocab-card { padding: 9px 11px; border: 1px solid #e5e5e0; border-radius: 8px; }
.vocab-word { font-size: 14px; font-weight: 600; color: #3C3489; }
.vocab-pos { font-size: 10px; color: #aaa; font-weight: 400; margin-left: 4px; }
.vocab-def { font-size: 12px; color: #555; margin-top: 2px; }
.vocab-ex { font-size: 11px; color: #888; margin-top: 3px; font-style: italic; line-height: 1.4; }

.q-block { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
.q-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.q-text { font-weight: 500; margin-bottom: 6px; }
.q-opt { padding: 2px 0 2px 12px; font-size: 13px; color: #444; }
.ans-box { margin-top: 7px; padding: 6px 10px; background: #EEEDFE; border-radius: 7px; font-size: 12px; color: #3C3489; }
.blank { display: inline-block; min-width: 80px; border-bottom: 1.5px solid #333; margin: 0 3px; }

/* 지문구조분석 */
.struct-item { margin-bottom: 12px; }
.struct-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.struct-title .badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: #EEEDFE; color: #534AB7; font-weight: 500; }
.struct-content { font-size: 13px; line-height: 1.8; color: #333; padding-left: 12px; border-left: 2px solid #eeedf8; }

/* 예상 변형문제 */
.vt-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-bottom: 5px; font-weight: 600; }
.vt-topic { background: #faeeda; color: #633806; }
.vt-blank { background: #EEEDFE; color: #3C3489; }
.vt-order { background: #E1F5EE; color: #0F6E56; }
.vt-vocab { background: #FAECE7; color: #993C1D; }
.vt-title { background: #FCEBEB; color: #A32D2D; }

.raw-panel { font-size: 12px; font-family: 'Menlo','Monaco',monospace; white-space: pre-wrap; line-height: 1.7; color: #555; padding: 1rem; background: #f8f8f8; border-radius: 8px; border: 1px solid #e0e0e0; max-width: 820px; }

@media print {
  .topbar,.sidebar,.tab-row,.toolbar,.main-header { display: none !important; }
  .layout { display: block; }
  .main { overflow: visible; }
  .output-area { padding: 0; }
  .ws-sec { break-inside: avoid; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">📘</div>
    <span class="app-name">영어 워크시트 생성기</span>
  </div>
  <div class="api-wrap">
    <span class="api-label">Anthropic API Key</span>
    <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-api03-..." />
    <button class="save-btn" onclick="saveKey()">💾 저장</button>
    <span class="save-badge" id="saveBadge">✓ 저장됨</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div>
      <span class="sec-label">영어 지문 입력</span>
      <textarea class="passage" id="passageInput"
        placeholder="영어 지문을 붙여넣으세요.&#10;비문학 / 문학 모두 가능합니다." oninput="updateCount()"></textarea>
      <div class="char-count" id="charCount">0 / 3,000자</div>
    </div>

    <div>
      <span class="sec-label">장르</span>
      <div class="pill-row" id="genreRow">
        <button class="pill active" onclick="setPill('genreRow',this,'비문학')">비문학</button>
        <button class="pill" onclick="setPill('genreRow',this,'문학')">문학</button>
        <button class="pill" onclick="setPill('genreRow',this,'자동감지')">자동 감지</button>
      </div>
    </div>

    <div>
      <span class="sec-label">생성할 섹션</span>
      <div class="type-grid">
        <button class="type-btn active" onclick="toggleType(this)" data-key="summary">📋 요약 인포그래픽</button>
        <button class="type-btn active" onclick="toggleType(this)" data-key="vocab">📖 핵심 어휘</button>
        <button class="type-btn active" onclick="toggleType(this)" data-key="structure">🔍 지문구조분석</button>
        <button class="type-btn active" onclick="toggleType(this)" data-key="variation">📝 예상변형문제</button>
        <button class="type-btn active" onclick="toggleType(this)" data-key="comprehension">❓ 독해 문제</button>
        <button class="type-btn active" onclick="toggleType(this)" data-key="fill">✏️ 빈칸 채우기</button>
        <button class="type-btn" onclick="toggleType(this)" data-key="discussion">💬 토론 질문</button>
        <button class="type-btn" onclick="toggleType(this)" data-key="translation">🌐 한국어 번역</button>
      </div>
    </div>

    <div>
      <span class="sec-label">난이도</span>
      <div class="pill-row" id="levelRow">
        <button class="pill active" onclick="setPill('levelRow',this,'중학')">중학</button>
        <button class="pill" onclick="setPill('levelRow',this,'고등')">고등</button>
        <button class="pill" onclick="setPill('levelRow',this,'수능')">수능</button>
      </div>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generate()">
      ✨ 워크시트 생성
    </button>
  </div>

  <div class="main">
    <div class="main-header">
      <span class="main-title">워크시트 미리보기</span>
      <div class="toolbar">
        <button class="tool-btn" onclick="window.print()">🖨️ 인쇄 / PDF</button>
        <button class="tool-btn" onclick="copyText()">📋 텍스트 복사</button>
      </div>
    </div>
    <div class="tab-row" id="tabRow" style="display:none">
      <div class="tab active" onclick="switchTab(this,'preview')">미리보기</div>
      <div class="tab" onclick="switchTab(this,'raw')">원본 텍스트</div>
    </div>
    <div class="output-area" id="outputArea">
      <div class="placeholder">
        <i class="ti ti-file-text"></i>
        <p>지문을 입력하고 워크시트 생성을 눌러주세요</p>
      </div>
    </div>
  </div>
</div>

<script>
let selectedGenre = '비문학';
let selectedLevel = '중학';
let selectedTypes = new Set(['summary','vocab','structure','variation','comprehension','fill']);
let rawText = '';

// API Key 자동 로드
window.addEventListener('load', () => {
  const saved = localStorage.getItem('anthropic_api_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('saveBadge').style.display = 'inline-block';
  }
});

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { alert('API Key를 입력해주세요.'); return; }
  localStorage.setItem('anthropic_api_key', key);
  const badge = document.getElementById('saveBadge');
  badge.style.display = 'inline-block';
  setTimeout(() => badge.style.display = 'none', 2000);
}

function updateCount() {
  const t = document.getElementById('passageInput').value;
  document.getElementById('charCount').textContent = `${t.length.toLocaleString()} / 3,000자`;
}

function setPill(rowId, btn, val) {
  document.getElementById(rowId).querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (rowId === 'genreRow') selectedGenre = val;
  else selectedLevel = val;
}

function toggleType(btn) {
  const key = btn.dataset.key;
  if (selectedTypes.has(key)) { selectedTypes.delete(key); btn.classList.remove('active'); }
  else { selectedTypes.add(key); btn.classList.add('active'); }
}

function switchTab(tab, name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const raw = document.getElementById('rawPanel');
  const preview = document.getElementById('previewPanel');
  if (name === 'raw' && raw) { raw.style.display='block'; if(preview) preview.style.display='none'; }
  else { if(preview) preview.style.display='block'; if(raw) raw.style.display='none'; }
}

function copyText() {
  if (!rawText) { alert('먼저 워크시트를 생성해주세요.'); return; }
  navigator.clipboard.writeText(rawText).then(() => alert('텍스트가 클립보드에 복사되었습니다.'));
}

function extractBlock(text, key) {
  const m = text.match(new RegExp(`===\\s*${key}\\s*===([\\s\\S]*?)(?====|$)`));
  return m ? m[1].trim() : null;
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Anthropic API Key를 입력하고 저장해주세요.'); return; }
  const passage = document.getElementById('passageInput').value.trim();
  if (!passage) { alert('지문을 입력해주세요.'); return; }
  if (selectedTypes.size === 0) { alert('최소 1개의 섹션을 선택해주세요.'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:15px;height:15px;border-width:2px;margin:0"></div> 생성 중...';

  const outputArea = document.getElementById('outputArea');
  outputArea.innerHTML = '<div class="loading"><div class="spinner"></div><p class="loading-text">AI가 워크시트를 생성하고 있습니다...</p></div>';
  document.getElementById('tabRow').style.display = 'none';

  const sections = [...selectedTypes];

  const sectionDefs = {
    summary: '요약 인포그래픽 (5W1H + 핵심 요점 5가지)',
    vocab: '핵심 어휘 10개 (영단어 | 품사 | 한국어뜻 | 영어예문)',
    structure: '지문구조분석 (주제, 소재, 글의 구조, 논리 흐름, 단락별 핵심 요약)',
    variation: '예상변형문제 (주제/제목 문제, 빈칸완성, 문장삽입/순서, 어휘추론 각 1문제씩, 정답 포함)',
    comprehension: '독해 문제 5개 (객관식, 정답 포함)',
    fill: '빈칸 채우기 5문제 (___로 빈칸 표시, 정답 포함)',
    discussion: '토론/서술 질문 3개',
    translation: '지문 전체 한국어 번역'
  };

  const prompt = `당신은 한국의 영어 교육 전문가입니다. 아래 영어 지문을 분석하여 ${selectedLevel} 수준의 워크시트를 만들어주세요.
장르: ${selectedGenre} / 난이도: ${selectedLevel}

[영어 지문]
${passage.slice(0, 2500)}

[생성할 섹션]
${sections.map(s => '- ' + sectionDefs[s]).join('\n')}

각 섹션을 아래 형식으로 정확히 출력하세요 (===구분자 필수):

${sections.includes('summary') ? `===SUMMARY===
WHO: (누가/무엇이)
WHAT: (무엇을)
WHEN: (언제, 해당없으면 N/A)
WHERE: (어디서, 해당없으면 N/A)
WHY: (왜)
HOW: (어떻게)
KEY_POINTS:
1. 핵심 포인트 1
2. 핵심 포인트 2
3. 핵심 포인트 3
4. 핵심 포인트 4
5. 핵심 포인트 5` : ''}
${sections.includes('vocab') ? `\n===VOCAB===
단어 | 품사 | 한국어뜻 | 영어예문
(총 10개, 한 줄에 하나씩)` : ''}
${sections.includes('structure') ? `\n===STRUCTURE===
TOPIC: (한 문장으로 주제)
SUBJECT: (소재)
PURPOSE: (글의 목적/유형)
LOGIC: (논리 전개 방식: 예시/대조/인과/열거 등)
FLOW:
1. [도입] 내용 요약
2. [전개] 내용 요약
3. [결론] 내용 요약
KEY_SENTENCE: (주제문 또는 핵심 문장 원문 그대로)` : ''}
${sections.includes('variation') ? `\n===VARIATION===
[주제/제목]
문제: 이 글의 주제/제목으로 가장 적절한 것은?
(A) 선택지1
(B) 선택지2
(C) 선택지3
(D) 선택지4
(E) 선택지5
정답: (X)
해설: 정답 이유 한 줄

[빈칸완성]
문제: 지문에서 빈칸에 들어갈 말로 가장 적절한 것은?
빈칸문장: (원문에서 핵심어를 ___로 치환한 문장)
(A) 선택지1 (B) 선택지2 (C) 선택지3 (D) 선택지4 (E) 선택지5
정답: (X)
해설: 정답 이유 한 줄

[문장삽입]
문제: 주어진 문장이 들어가기에 가장 적절한 곳은?
삽입문장: (삽입할 문장)
지문위치: ①②③④⑤ 중 (X)번
정답: (X)
해설: 정답 이유 한 줄

[어휘추론]
문제: 밑줄 친 어휘 중 문맥상 쓰임이 적절하지 않은 것은?
(A) 어휘1 - 뜻 (B) 어휘2 - 뜻 (C) 어휘3 - 뜻 (D) 어휘4 - 뜻 (E) 어휘5 - 뜻
정답: (X)
해설: 정답 이유 한 줄` : ''}
${sections.includes('comprehension') ? `\n===COMPREHENSION===
Q1. 문제내용
(A) 선택지1 (B) 선택지2 (C) 선택지3 (D) 선택지4
정답: (X)
Q2. ...` : ''}
${sections.includes('fill') ? `\n===FILL===
1. 빈칸이 있는 문장 (___)
정답: 정답단어
2. ...` : ''}
${sections.includes('discussion') ? `\n===DISCUSSION===
1. 토론 질문 1
2. 토론 질문 2
3. 토론 질문 3` : ''}
${sections.includes('translation') ? `\n===TRANSLATION===
(지문 전체 한국어 번역)` : ''}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const e = await res.json(); msg = e.error?.message || msg; } catch(e2){}
      throw new Error(msg);
    }
    const data = await res.json();
    rawText = data.content?.[0]?.text || '';
    if (!rawText) throw new Error('응답이 비어 있습니다.');
    renderWorksheet(rawText, sections);
  } catch (e) {
    let hint = '';
    if (e.message.includes('Failed to fetch')) hint = '<br><small style="color:#888">브라우저 보안 정책 문제일 수 있습니다. Chrome을 사용하고 계신지 확인해주세요.</small>';
    if (e.message.includes('401') || e.message.includes('authentication')) hint = '<br><small style="color:#888">API Key를 다시 확인해주세요.</small>';
    outputArea.innerHTML = `<div class="placeholder"><span style="font-size:40px">⚠️</span><p style="color:#c00">오류: ${e.message}</p>${hint}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '✨ 워크시트 생성';
}

function renderWorksheet(text, sections) {
  const outputArea = document.getElementById('outputArea');
  let html = '<div class="worksheet" id="previewPanel">';
  const wlabels = { WHO:'👤 누가', WHAT:'📌 무엇을', WHEN:'🕐 언제', WHERE:'📍 어디서', WHY:'❓ 왜', HOW:'⚙️ 어떻게' };

  // 요약 인포그래픽
  if (sections.includes('summary')) {
    const block = extractBlock(text, 'SUMMARY');
    if (block) {
      const lines = block.split('\n').filter(l => l.trim());
      const fiveW = lines.filter(l => /^(WHO|WHAT|WHEN|WHERE|WHY|HOW):/.test(l.trim()));
      const kpStart = lines.findIndex(l => l.includes('KEY_POINTS'));
      const kps = kpStart >= 0 ? lines.slice(kpStart+1).filter(l => /^\d+\./.test(l.trim())) : [];
      html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-file-description"></i>요약 인포그래픽</div><div class="ws-body"><div class="grid2">`;
      fiveW.forEach(l => {
        const idx = l.indexOf(':'); const k = l.slice(0,idx).trim(); const v = l.slice(idx+1).trim();
        html += `<div class="card-sm"><div class="card-sm-label">${wlabels[k]||k}</div><div class="card-sm-val">${v}</div></div>`;
      });
      html += '</div>';
      if (kps.length) {
        html += `<div style="font-size:11px;font-weight:600;color:#999;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.05em">핵심 요점</div><ol>`;
        kps.forEach(k => { html += `<li>${k.replace(/^\d+\.\s*/,'')}</li>`; });
        html += '</ol>';
      }
      html += '</div></div>';
    }
  }

  // 지문구조분석
  if (sections.includes('structure')) {
    const block = extractBlock(text, 'STRUCTURE');
    if (block) {
      const get = (key) => { const m = block.match(new RegExp(`${key}:\\s*(.+)`)); return m ? m[1].trim() : ''; };
      const flowStart = block.indexOf('FLOW:');
      const flowEnd = block.indexOf('KEY_SENTENCE:');
      const flowLines = flowStart >= 0 ? block.slice(flowStart+5, flowEnd>=0?flowEnd:undefined).split('\n').filter(l=>/^\d+\./.test(l.trim())) : [];
      const keySentence = get('KEY_SENTENCE');

      html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-sitemap"></i>지문 구조 분석</div><div class="ws-body">`;
      html += `<div class="grid2" style="margin-bottom:12px">`;
      [['주제', get('TOPIC')],['소재', get('SUBJECT')],['목적/유형', get('PURPOSE')],['논리 전개', get('LOGIC')]].forEach(([l,v]) => {
        if(v) html += `<div class="card-sm"><div class="card-sm-label">${l}</div><div class="card-sm-val">${v}</div></div>`;
      });
      html += '</div>';
      if (flowLines.length) {
        html += `<div style="font-size:11px;font-weight:600;color:#999;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">논리 흐름</div>`;
        flowLines.forEach(l => {
          const m = l.match(/^\d+\.\s*(\[.+?\])?\s*(.*)/);
          if(m) html += `<div class="struct-item"><div class="struct-content">${m[1]?`<span class="badge" style="background:#EEEDFE;color:#534AB7;font-size:10px;padding:1px 6px;border-radius:10px;margin-right:5px">${m[1]}</span>`:''}${m[2]}</div></div>`;
        });
      }
      if (keySentence) html += `<div style="margin-top:10px;padding:10px;background:#fafafa;border-left:3px solid #534AB7;border-radius:0 7px 7px 0;font-size:12px;color:#333;font-style:italic;line-height:1.7"><span style="font-size:10px;font-weight:600;color:#534AB7;display:block;margin-bottom:3px">핵심 문장</span>${keySentence}</div>`;
      html += '</div></div>';
    }
  }

  // 핵심 어휘
  if (sections.includes('vocab')) {
    const block = extractBlock(text, 'VOCAB');
    if (block) {
      const rows = block.split('\n').filter(l => l.includes('|'));
      html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-book"></i>핵심 어휘</div><div class="ws-body"><div class="grid2">`;
      rows.forEach(r => {
        const p = r.split('|').map(x=>x.trim());
        if(p.length>=3) html += `<div class="vocab-card"><div class="vocab-word">${p[0]}<span class="vocab-pos">${p[1]||''}</span></div><div class="vocab-def">${p[2]}</div>${p[3]?`<div class="vocab-ex">${p[3]}</div>`:''}</div>`;
      });
      html += '</div></div></div>';
    }
  }

  // 예상변형문제
  if (sections.includes('variation')) {
    const block = extractBlock(text, 'VARIATION');
    if (block) {
      const vtTypes = [
        { key: '주제/제목', label: '주제 / 제목', badge: 'vt-topic', icon: 'ti-target' },
        { key: '빈칸완성', label: '빈칸 완성', badge: 'vt-blank', icon: 'ti-pencil' },
        { key: '문장삽입', label: '문장 삽입', badge: 'vt-order', icon: 'ti-arrows-sort' },
        { key: '어휘추론', label: '어휘 추론', badge: 'vt-vocab', icon: 'ti-vocabulary' }
      ];
      html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-writing"></i>예상 변형문제</div><div class="ws-body">`;
      vtTypes.forEach(vt => {
        const secM = block.match(new RegExp(`\\[${vt.key}\\]([\\s\\S]*?)(?=\\[|$)`));
        if (!secM) return;
        const sec = secM[1].trim();
        const lines = sec.split('\n').filter(l=>l.trim());
        const qLine = lines.find(l => l.startsWith('문제:'));
        const opts = lines.filter(l => /^\([A-E]\)/.test(l.trim()));
        const ans = lines.find(l => /^정답:/.test(l.trim()));
        const exp = lines.find(l => /^해설:/.test(l.trim()));
        const extra = lines.find(l => l.startsWith('빈칸문장:') || l.startsWith('삽입문장:') || l.startsWith('지문위치:'));

        html += `<div class="q-block"><span class="vt-badge ${vt.badge}"><i class="ti ${vt.icon}" style="font-size:10px"></i> ${vt.label}</span>`;
        if(qLine) html += `<p class="q-text" style="margin-top:4px">${qLine.replace('문제:','').trim()}</p>`;
        if(extra) html += `<p style="font-size:12px;color:#555;margin:4px 0 6px;padding:5px 8px;background:#f8f8f8;border-radius:5px;font-style:italic">${extra}</p>`;
        opts.forEach(o => { html += `<p class="q-opt">${o.trim()}</p>`; });
        if(ans) html += `<div class="ans-box">${ans.trim()}${exp?'<br><span style="color:#666">'+exp.trim()+'</span>':''}</div>`;
        html += '</div>';
      });
      html += '</div></div>';
    }
  }

  // 독해 문제
  if (sections.includes('comprehension')) {
    const block = extractBlock(text, 'COMPREHENSION');
    if (block) {
      html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-help-circle"></i>독해 문제</div><div class="ws-body">`;
      block.split(/(?=Q\d+\.)/).filter(b=>b.trim()).forEach(qb => {
        const lines = qb.trim().split('\n');
        const q = lines[0]; const opts = lines.slice(1).filter(l=>/^\(/.test(l.trim()));
        const ans = lines.find(l=>/^정답:/.test(l.trim()));
        html += `<div class="q-block"><p class="q-text">${q}</p>`;
        opts.forEach(o => { html += `<p class="q-opt">${o.trim()}</p>`; });
        if(ans) html += `<div class="ans-box">${ans.trim()}</div>`;
        html += '</div>';
      });
      html += '</div></div>';
    }
  }

  // 빈칸 채우기
  if (sections.includes('fill')) {
    const block = extractBlock(text, 'FILL');
    if (block) {
      html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-pencil"></i>빈칸 채우기</div><div class="ws-body">`;
      block.split(/(?=\d+\.)/).filter(b=>b.trim()).forEach(item => {
        const lines = item.trim().split('\n');
        const q = lines[0].replace(/___/g,'<span class="blank"></span>');
        const ans = lines.find(l=>/^정답:/.test(l.trim()));
        html += `<div class="q-block"><p>${q}</p>${ans?`<div class="ans-box">${ans.trim()}</div>`:''}</div>`;
      });
      html += '</div></div>';
    }
  }

  // 토론 질문
  if (sections.includes('discussion')) {
    const block = extractBlock(text, 'DISCUSSION');
    if (block) {
      html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-message-circle"></i>토론 질문</div><div class="ws-body"><ol>`;
      block.split('\n').filter(l=>/^\d+\./.test(l.trim())).forEach(l => { html += `<li>${l.replace(/^\d+\.\s*/,'')}</li>`; });
      html += '</ol></div></div>';
    }
  }

  // 한국어 번역
  if (sections.includes('translation')) {
    const block = extractBlock(text, 'TRANSLATION');
    if (block) html += `<div class="ws-sec"><div class="ws-head"><i class="ti ti-language"></i>한국어 번역</div><div class="ws-body" style="line-height:1.9">${block.replace(/\n/g,'<br>')}</div></div>`;
  }

  html += '</div>';
  html += `<div id="rawPanel" style="display:none;margin-top:1rem"><div class="raw-panel">${rawText.replace(/</g,'&lt;')}</div></div>`;
  outputArea.innerHTML = html;
  document.getElementById('tabRow').style.display = 'flex';
}
</script>
</body>
</html>
