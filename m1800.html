<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>씨유에탑 · 중등기본 1800</title>
  <meta property="og:title" content="씨유에탑 · 중등기본 1800">
  <meta property="og:description" content="총 600단어 수록 · 씨유에탑 영어단어장">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #EFF6FF;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --bg-body: #F3F4F6;
      --bg-card: #FFFFFF;
      --border: #E5E7EB;
      --accent: #F59E0B;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    #app-container {
      width: 100%;
      max-width: 420px;
      background-color: var(--bg-card);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    header {
      background-color: var(--primary);
      color: #FFFFFF;
      padding: 20px 16px;
      text-align: center;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .nav-tabs {
      display: flex;
      background-color: #FFFFFF;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 0;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom: 3px solid var(--primary);
    }

    .range-container {
      background-color: #FFFFFF;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .range-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .range-bar::-webkit-scrollbar {
      height: 4px;
    }
    .range-bar::-webkit-scrollbar-thumb {
      background-color: var(--border);
      border-radius: 2px;
    }
    .range-btn {
      padding: 6px 14px;
      background-color: var(--bg-body);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      flex-shrink: 0;
    }
    .range-btn.active {
      background-color: var(--primary);
      color: #FFFFFF;
      border-color: var(--primary);
    }

    .content-view {
      flex: 1;
      padding: 16px;
      display: none;
    }
    .content-view.active {
      display: flex;
      flex-direction: column;
    }

    .controls {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .search-box {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .filter-bar {
      display: flex;
      gap: 6px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px 0;
      background-color: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
    }
    .filter-btn.active {
      background-color: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .word-card {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .word-card.memorized {
      opacity: 0.55;
      background-color: #FAFAFA;
    }
    .word-info {
      flex: 1;
    }
    .word-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .eng-word {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }
    .pos-tag {
      font-size: 10px;
      background-color: #F3F4F6;
      padding: 1px 4px;
      border-radius: 3px;
      color: var(--text-muted);
    }
    .phonetic {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .meaning {
      font-size: 14px;
      color: var(--text-main);
      font-weight: 500;
    }
    .word-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-muted);
    }
    .action-btn.fav.active { color: var(--accent); }
    .action-btn.check.active { color: #10B981; }

    .flashcard-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      min-height: 340px;
    }
    .flashcard {
      width: 100%;
      height: 260px;
      background-color: #FFFFFF;
      border: 2px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      text-align: center;
    }
    .card-word {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .card-phonetic {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .card-meaning {
      font-size: 18px;
      font-weight: 600;
      color: #EF4444;
      min-height: 24px;
    }
    .card-hint {
      font-size: 12px;
      color: var(--text-muted);
      position: absolute;
      bottom: 16px;
    }
    .card-audio-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--primary-light);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--primary);
    }
    .flashcard-nav {
      display: flex;
      width: 100%;
      gap: 12px;
    }
    .card-nav-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-know { background-color: #10B981; color: #FFFFFF; }
    .btn-dont { background-color: #EF4444; color: #FFFFFF; }

    .quiz-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .quiz-progress {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-align: right;
    }
    .quiz-question-box {
      background-color: var(--primary-light);
      border-radius: 12px;
      padding: 30px 16px;
      text-align: center;
      margin-bottom: 20px;
    }
    .quiz-q-word {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option-btn {
      width: 100%;
      padding: 14px;
      background-color: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .quiz-result {
      text-align: center;
      padding: 40px 16px;
    }
    .result-emoji { font-size: 64px; margin-bottom: 16px; }
    .result-score { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .restart-btn {
      margin-top: 24px;
      padding: 12px 24px;
      background-color: var(--primary);
      color: #FFFFFF;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <header>
      <h1>씨유에탑 ✦ 영어단어장</h1>

    <div class="nav-tabs">

      <button class="tab-btn" id="tab-quiz" onclick="switchTab('quiz')">퀴즈모드</button>

    <div class="range-container">

    <div id="view-list" class="content-view active">

        <div class="filter-bar">

    </div>

    <div id="view-quiz" class="content-view">
      <div class="quiz-wrapper" id="quiz-wrapper-ui"></div>
    </div>
  </div>

    // State Variables
    let words = [];
    let currentTab = 'list';
    let currentRange = 'all'; // 'all' or index number
    let currentFilter = 'all'; // 'all', 'unknown', 'fav'
    let flashCardIdx = 0;
    let flashCardShowMeaning = false;
    let quizData = [];
    let quizIdx = 0;
    let quizScore = 0;
    
    // Swipe Control
    let touchStartX = 0;
    let touchEndX = 0;

    // LocalStorage Synchronization Setup
    function initData() {
      const savedFavs = JSON.parse(localStorage.getItem('cu_favs') || '[]');
      const savedKnowns = JSON.parse(localStorage.getItem('cu_knowns') || '[]');

      words = rawWords.map((w, index) => ({
        ...w,
        id: index,
        fav: savedFavs.includes(index),
        memorized: savedKnowns.includes(index)
      }));

      document.getElementById('header-subtitle').innerText = `중등기본 1800 · 총 ${words.length}단어`;
    }

    function saveState() {
      const favs = words.filter(w => w.fav).map(w => w.id);
      const knowns = words.filter(w => w.memorized).map(w => w.id);
      localStorage.setItem('cu_favs', JSON.stringify(favs));
      localStorage.setItem('cu_knowns', JSON.stringify(knowns));
    }

    // Dynamic Navigation Generation
    function renderRangeBar() {
      const bar = document.getElementById('range-bar-ui');
      let html = `<button class="range-btn ${currentRange === 'all' ? 'active' : ''}" onclick="selectRange('all')">전체보기</button>`;
      
      const step = 10;
      const totalGroups = Math.ceil(words.length / step);
      
      for(let i = 0; i < totalGroups; i++) {
        const start = i * step + 1;
        const end = Math.min((i + 1) * step, words.length);
        const label = `${start}-${end}`;
        html += `<button class="range-btn ${currentRange === i ? 'active' : ''}" onclick="selectRange(${i})">${label}</button>`;
      }
      bar.innerHTML = html;
    }

    function selectRange(range) {
      currentRange = range;
      renderRangeBar();
      refreshActiveView();
    }

    function setFilter(filter) {
      currentFilter = filter;
      ['all', 'unknown', 'fav'].forEach(f => {
        document.getElementById(`filter-${f}`).classList.remove('active');
      });
      document.getElementById(`filter-${filter}`).classList.add('active');
      renderWordList();
    }

    // View Routing Core Control
    function switchTab(tab) {
      currentTab = tab;
      ['list', 'card', 'quiz'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.remove('active');
        document.getElementById(`view-${t}`).classList.remove('active');
      });
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.getElementById(`view-${tab}`).classList.add('active');
      
      refreshActiveView();
    }

    function refreshActiveView() {
      if (currentTab === 'list') renderWordList();
      else if (currentTab === 'card') initFlashcard();
      else if (currentTab === 'quiz') initQuiz();
    }

    // Segment & Conditions Filter Logic
    function getFilteredWords() {
      let result = [...words];
      
      // Range segment constraint
      if (currentRange !== 'all') {
        const startIdx = currentRange * 10;
        result = result.slice(startIdx, startIdx + 10);
      }
      
      // Custom tab state rules
      if (currentTab === 'list') {
        const searchVal = document.getElementById('search-input').value.toLowerCase().trim();
        if (searchVal) {
          result = result.filter(w => w.word.toLowerCase().includes(searchVal) || w.meaning.includes(searchVal));
        }
        if (currentFilter === 'unknown') result = result.filter(w => !w.memorized);
        if (currentFilter === 'fav') result = result.filter(w => w.fav);
      }
      
      return result;
    }

    // TTS Core Speech
    function playTTS(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      }
    }

    // VIEW 1: Render List Engine
    function renderWordList() {
      const container = document.getElementById('word-list-container');
      const activeList = getFilteredWords();
      
      if(activeList.length === 0) {
        container.innerHTML = `<div class="empty-msg">해당하는 단어가 없습니다.</div>`;
        return;
      }

      container.innerHTML = activeList.map(w => `
        <div class="word-card ${w.memorized ? 'memorized' : ''}">
          <div class="word-info">
            <div class="word-top">
              <span class="eng-word">${w.word}</span>
              <span class="pos-tag">${w.pos}</span>
            </div>
            <div class="phonetic">${w.phonetic || ''}</div>
            <div class="meaning">${w.meaning}</div>
          </div>
          <div class="word-actions">
            <button class="action-btn" onclick="playTTS('${w.word.replace(/'/g, "\\'")}')">🔊</button>
            <button class="action-btn fav ${w.fav ? 'active' : ''}" onclick="toggleFav(${w.id})">★</button>
            <button class="action-btn check ${w.memorized ? 'active' : ''}" onclick="toggleMemorized(${w.id})">✔</button>
          </div>
        </div>
      `).join('');
    }

    function toggleFav(id) {
      const idx = words.findIndex(w => w.id === id);
      if(idx !== -1) {
        words[idx].fav = !words[idx].fav;
        saveState();
        renderWordList();
      }
    }

    function toggleMemorized(id) {
      const idx = words.findIndex(w => w.id === id);
      if(idx !== -1) {
        words[idx].memorized = !words[idx].memorized;
        saveState();
        renderWordList();
      }
    }

    // VIEW 2: Render Flashcard Engine
    function initFlashcard() {
      flashCardIdx = 0;
      flashCardShowMeaning = false;
      renderFlashcard();
    }

    function renderFlashcard() {
      const container = document.getElementById('card-wrapper-ui');
      const activeList = getFilteredWords();

      if(activeList.length === 0) {
        container.innerHTML = `<div class="empty-msg">선택 구간에 단어가 없습니다.</div>`;
        return;
      }

      const item = activeList[flashCardIdx];

      container.innerHTML = `
        <div class="flashcard" id="touch-card-target" onclick="toggleCardMeaning('${item.word.replace(/'/g, "\\'")}')">
          <button class="card-audio-btn" onclick="handleCardAudio(event, '${item.word.replace(/'/g, "\\'")}')">🔊</button>
          <div class="card-word">${item.word}</div>
          <div class="card-phonetic">${item.phonetic || ''}</div>
          <div class="card-meaning" style="visibility: ${flashCardShowMeaning ? 'visible' : 'hidden'}">${item.meaning}</div>
          <div class="card-hint">💡 카드를 터치하면 뜻이 보입니다 (좌우 스와이프 가능)</div>
        </div>
        <div class="flashcard-nav">
          <button class="card-nav-btn btn-dont" onclick="moveCard(1)">아직 모름 (${flashCardIdx + 1}/${activeList.length})</button>
          <button class="card-nav-btn btn-know" onclick="markAsKnown(${item.id})">알아요 ✔</button>
        </div>
      `;

      // Attach Swipe Events Explicitly
      const el = document.getElementById('touch-card-target');
      el.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
      el.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleCardSwipe();
      }, false);
    }

    function toggleCardMeaning(word) {
      if(!flashCardShowMeaning) {
        flashCardShowMeaning = true;
        document.querySelector('.card-meaning').style.visibility = 'visible';
        playTTS(word);
      } else {
        flashCardShowMeaning = false;
        document.querySelector('.card-meaning').style.visibility = 'hidden';
      }
    }

    function handleCardAudio(e, word) {
      e.stopPropagation(); // Prevents flipping card trigger
      playTTS(word);
    }

    function handleCardSwipe() {
      if (touchStartX - touchEndX > 50) moveCard(1); // Left swipe -> Next
      if (touchEndX - touchStartX > 50) moveCard(-1); // Right swipe -> Prev
    }

    function moveCard(dir) {
      const activeList = getFilteredWords();
      flashCardIdx += dir;
      if(flashCardIdx >= activeList.length) flashCardIdx = 0;
      if(flashCardIdx < 0) flashCardIdx = activeList.length - 1;
      flashCardShowMeaning = false;
      renderFlashcard();
    }

    function markAsKnown(id) {
      const idx = words.findIndex(w => w.id === id);
      if(idx !== -1) {
        words[idx].memorized = true;
        saveState();
      }
      moveCard(1);
    }

    // VIEW 3: Render Quiz Engine
    function initQuiz() {
      const activeList = getFilteredWords();
      if(activeList.length < 4) {
        document.getElementById('quiz-wrapper-ui').innerHTML = `<div class="empty-msg">퀴즈를 출제하려면 최소 4개 이상의 단어가 필요합니다. (현재 구간 단어 부족)</div>`;
        return;
      }
      
      // Shuffle & Select Max 10 Questions
      quizData = [...activeList].sort(() => 0.5 - Math.random()).slice(0, 10);
      quizIdx = 0;
      quizScore = 0;
      
      renderQuizQuestion();
    }

    function renderQuizQuestion() {
      const container = document.getElementById('quiz-wrapper-ui');
      const item = quizData[quizIdx];
      
      // Generate Distractors
      let options = [item.meaning];
      let pool = words.filter(w => w.meaning !== item.meaning).map(w => w.meaning);
      pool.sort(() => 0.5 - Math.random());
      
      for(let i=0; i<3; i++) {
        if(pool[i]) options.push(pool[i]);
      }
      options.sort(() => 0.5 - Math.random());

      container.innerHTML = `
        <div class="quiz-progress">문제 ${quizIdx + 1} / ${quizData.length}</div>
        <div class="quiz-question-box">
          <div class="quiz-q-word">${item.word}</div>
        </div>
        <div class="quiz-options">
          ${options.map(opt => `<button class="option-btn" onclick="submitAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
        </div>
      `;

      playTTS(item.word);
    }

    function submitAnswer(chosen) {
      const item = quizData[quizIdx];
      if(chosen === item.meaning) quizScore++;
      
      quizIdx++;
      if(quizIdx < quizData.length) {
        renderQuizQuestion();
      } else {
        renderQuizResult();
      }
    }

    function renderQuizResult() {
      const container = document.getElementById('quiz-wrapper-ui');
      const percent = Math.round((quizScore / quizData.length) * 100);
      
      let emoji = '😢';
      let comment = '조금 더 노력을 기울여봐요!';
      if(percent >= 90) { emoji = '😎'; comment = '완벽해요! 씨유에탑 최고 에이스!'; }
      else if(percent >= 70) { emoji = '👍'; comment = '참 잘했습니다. 조금만 더 파이팅!'; }

      container.innerHTML = `
        <div class="quiz-result">
          <div class="result-emoji">${emoji}</div>
          <div class="result-score">${quizScore} / ${quizData.length} 맞춤</div>
          <p style="font-weight: 600; color: var(--text-main);">${comment}</p>
          <button class="restart-btn" onclick="initQuiz()">다시 도전하기</button>
        </div>
      `;
    }

    // System Orchestration Bootcamp Entry
    window.onload = function() {
      initData();
      renderRangeBar();
      renderWordList();
    };
  </script>
</body>
</html>
