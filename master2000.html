<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>씨유에탑 · 수능 2000 renew (Day 1 - Day 50)</title>
  <meta property="og:title" content="씨유에탑 · 수능 2000 renew (Day 1 - Day 50)">
  <meta property="og:description" content="총 844단어 수록 · 씨유에탑 영어단어장">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
      --star: #F59E0B;
      --danger: #EF4444;
      --success: #10B981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', 'Nunito', sans-serif; }
    body { background: var(--bg); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
    
    .app-container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }

    /* Header */
    header {
      background: var(--primary);
      color: white;
      padding: 24px 16px 16px;
      text-align: center;
    }
    header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    header p { font-size: 13px; color: rgba(255,255,255,0.8); }

    /* Navigation Tabs */
    .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .tab-btn { flex: 1; padding: 14px 0; text-align: center; border: none; background: none; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--primary); font-weight: 700; border-bottom-color: var(--primary); }

    /* Range Bar UI (가로 스크롤, 10개 단위 분할) */
    .range-container {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .range-container::-webkit-scrollbar { display: none; }
    .range-btn {
      display: inline-block;
      padding: 6px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
    }
    .range-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Controls (Search & Filters) */
    .controls { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; background: #fff; }
    .search-wrapper { position: relative; }
    .search-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--primary); }
    .filter-bar { display: flex; gap: 6px; }
    .filter-btn { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: #fff; border-radius: 6px; color: var(--text-muted); cursor: pointer; }
    .filter-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); font-weight: 600; }

    /* View Content Areas */
    .view-panel { display: none; flex: 1; padding: 16px; }
    .view-panel.active { display: flex; flex-direction: column; }

    /* List Layout */
    .word-list { display: flex; flex-direction: column; gap: 10px; }
    .word-item { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; align-items: center; gap: 12px; }
    .word-item.known { opacity: 0.5; background: #F3F4F6; }
    .word-info { flex: 1; }
    .word-top { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
    .word-eng { font-size: 17px; font-weight: 700; color: #000; font-family: 'Nunito', sans-serif; }
    .word-pos { font-size: 11px; background: #E5E7EB; padding: 1px 4px; border-radius: 3px; color: var(--text-muted); font-weight: 500; }
    .word-pho { font-size: 12px; color: var(--text-muted); font-family: 'Nunito', sans-serif; }
    .word-meaning { font-size: 15px; font-weight: 500; color: var(--text-main); margin-top: 4px; }
    
    .icon-btn { border: none; background: none; cursor: pointer; padding: 4px; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .btn-fav { color: #D1D5DB; }
    .btn-fav.active { color: var(--star); }
    .btn-tts { color: var(--primary); }
    .btn-check { color: #D1D5DB; }
    .btn-check.active { color: #10B981; }

    /* Flashcard Layout 보완 */
    .flashcard-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; }
    .flashcard {
      width: 100%;
      height: 320px;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.03);
      padding: 24px;
      text-align: center;
    }
    
    /* 요구 반영된 반복 재생 스피커 디자인 */
    .fc-speaker-box { margin-bottom: 12px; z-index: 10; }
    .btn-fc-audio { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-light); color: var(--primary); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(37,99,235,0.1); }
    
    .fc-fav-pos { position: absolute; top: 16px; right: 16px; font-size: 24px; }
    .fc-pos { font-size: 12px; background: var(--primary-light); color: var(--primary); padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 8px; }
    .fc-eng { font-size: 30px; font-weight: 800; color: #111827; font-family: 'Nunito', sans-serif; margin-bottom: 4px; }
    .fc-pho { font-size: 14px; color: var(--text-muted); font-family: 'Nunito', sans-serif; margin-bottom: 20px; }
    .fc-meaning-box { min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
    .fc-meaning { font-size: 22px; font-weight: 700; color: var(--success); display: none; }
    .fc-hint { font-size: 13px; color: var(--text-muted); }
    .fc-info-text { font-size: 11px; color: #9CA3AF; margin-top: 12px; }
    
    /* 하단 버튼 피드백 반영 개편 */
    .fc-actions { width: 100%; display: flex; gap: 10px; margin-top: 16px; }
    .fc-btn { flex: 1; padding: 14px 0; border: 1px solid var(--border); background: #fff; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .fc-btn.wrong { color: var(--danger); border-color: rgba(239,68,68,0.3); background: #FEF2F2; }
    .fc-btn.known { color: #fff; background: var(--success); border-color: var(--success); }

    /* Quiz Layout */
    .quiz-container { display: flex; flex-direction: column; gap: 16px; flex: 1; }
    .quiz-progress { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .quiz-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-align: center; position: relative; }
    .quiz-word { font-size: 28px; font-weight: 800; color: var(--text-main); font-family: 'Nunito', sans-serif; margin-bottom: 4px; }
    .quiz-pho { font-size: 14px; color: var(--text-muted); font-family: 'Nunito', sans-serif; }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn { width: 100%; padding: 14px 16px; text-align: left; background: #fff; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
    .option-btn.correct { background: #D1FAE5; border-color: #10B981; color: #065F46; font-weight: 700; }
    .option-btn.wrong { background: #FEE2E2; border-color: #EF4444; color: #991B1B; }
    
    .result-view { text-align: center; padding: 40px 16px; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .result-score { font-size: 48px; font-weight: 800; color: var(--primary); font-family: 'Nunito', sans-serif; }
    .result-comment { font-size: 18px; font-weight: 700; color: var(--text-main); }
    .result-btn { width: 80%; padding: 12px 0; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .empty-msg { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>씨유에탑 ✦ 영어단어장</h1>
      <p id="sub-title">수능 2000 renew (Day 1 - Day 50) · 로딩 중...</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list')">단어목록</button>
      <button class="tab-btn" onclick="switchTab('card')">플래시카드</button>
      <button class="tab-btn" onclick="switchTab('quiz')">퀴즈모드</button>
    </div>

    <div class="range-container" id="range-bar"></div>

    <div class="controls" id="list-controls">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="search-box" placeholder="단어 또는 뜻 검색..." oninput="renderList()">
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" id="f-all" onclick="setFilter('all')">전체보기</button>
        <button class="filter-btn" id="f-wrong" onclick="setFilter('wrong')">모름</button>
        <button class="filter-btn" id="f-fav" onclick="setFilter('fav')">⭐ 즐겨찾기</button>
      </div>
    </div>

    <div class="view-panel active" id="panel-list">
      <div class="word-list" id="word-list-box"></div>
    </div>

    <div class="view-panel" id="panel-card">
      <div class="flashcard-wrapper">
        <div class="flashcard" id="card-box" onclick="revealCard()">
          
          <div class="fc-speaker-box">
            <button class="btn-fc-audio" id="fc-audio-btn" onclick="triggerCardTTS(event)">🔊</button>
          </div>
          
          <button class="icon-btn btn-fav fc-fav-pos" id="fc-fav-btn">★</button>
          <div class="fc-pos" id="fc-partofspeech">n</div>
          <div class="fc-eng" id="fc-english">Word</div>
          <div class="fc-pho" id="fc-phonetic">[phonetic]</div>
          
          <div class="fc-meaning-box">
            <div class="fc-meaning" id="fc-korean">뜻</div>
            <div class="fc-hint" id="fc-hint-text">💡 카드를 터치하면 뜻과 발음이 나옵니다.</div>
          </div>
          <div class="fc-info-text" id="fc-count-swipe">(1 / 10) Swipe 좌우 이동 가능</div>
        </div>
        
        <div class="fc-actions">
          <button class="fc-btn wrong" onclick="markCardStatus('')">아직 모름 ❌</button>
          <button class="fc-btn known" onclick="markCardStatus('known')">외웠음 ✓</button>
        </div>
      </div>
    </div>

    <div class="view-panel" id="panel-quiz">
      <div class="quiz-container" id="quiz-game">
        <div class="quiz-progress">
          <span id="qz-count">문제 1 / 10</span>
          <span id="qz-score-track">맞춤: 0</span>
        </div>
        <div class="quiz-card">
          <div class="quiz-word" id="qz-eng">Word</div>
          <div class="quiz-pho" id="qz-pho">[phonetic]</div>
        </div>
        <div class="quiz-options" id="qz-options-box"></div>
      </div>
      <div class="result-view" id="quiz-result">
        <div class="result-score" id="res-score">100점</div>
        <div class="result-comment" id="res-comment">최고예요! 완벽합니다.</div>
        <button class="result-btn" onclick="startQuiz()">다시 도전하기</button>
      </div>
    </div>
  </div>

  <script>
    // Injected Data Pool (중복제거 및 불순물 정제 완료 상태)
    const rawWords = [
      {word:"audience",phonetic:"[ˈɔːdiəns]",meaning:"청중",pos:"n"},
      {word:"improve",phonetic:"[ɪmˈpruːv]",meaning:"향상시키다",pos:"v"},
      {word:"terrible",phonetic:"[ˈterəbl]",meaning:"형편없는",pos:"a"},
      {word:"opportunity",phonetic:"[ˌɒpəˈtjuːnəti]",meaning:"기회",pos:"n"},
      {word:"develop",phonetic:"[ɪˈveləp]",meaning:"개발하다",pos:"v"},
      {word:"inform",phonetic:"[ɪnˈfɔːm]",meaning:"알리다",pos:"v"},
      {word:"relationship",phonetic:"[rɪˈleɪʃnʃɪp]",meaning:"관계",pos:"n"},
      {word:"attitude",phonetic:"[ˈætɪtjuːd]",meaning:"태도",pos:"n"},
      {word:"research",phonetic:"[rɪˈsɜːtʃ]",meaning:"연구",pos:"n"},
      {word:"require",phonetic:"[rɪˈkwaɪə]",meaning:"요구하다",pos:"v"},
      {word:"volunteer",phonetic:"[ˌvɒlənˈtɪə]",meaning:"자원봉사자",pos:"n"},
      {word:"service",phonetic:"[ˈsɜːvɪs]",meaning:"봉사",pos:"n"},
      {word:"individual",phonetic:"[ˌɪndɪˈvɪdʒuəl]",meaning:"개인의",pos:"a"},
      {word:"advise",phonetic:"[ədˈvaɪz]",meaning:"조언하다",pos:"v"},
      {word:"influence",phonetic:"[ˈɪnfluəns]",meaning:"영향을 미치다",pos:"v"},
      {word:"behave",phonetic:"[bɪˈheɪv]",meaning:"행동하다",pos:"v"},
      {word:"employ",phonetic:"[ɪmˈplɔɪ]",meaning:"고용하다",pos:"v"},
      {word:"social",phonetic:"[ˈsəʊʃl]",meaning:"사회적인",pos:"a"},
      {word:"amount",phonetic:"[əˈmaʊnt]",meaning:"양",pos:"n"},
      {word:"provide",phonetic:"[prəˈvaɪd]",meaning:"제공하다",pos:"v"},
      {word:"recognize",phonetic:"[ˈrekəɡnaɪz]",meaning:"알아차리다",pos:"v"},
      {word:"material",phonetic:"[məˈtɪəriəl]",meaning:"재료",pos:"n"},
      {word:"expense",phonetic:"[ɪkˈspens]",meaning:"비용",pos:"n"},
      {word:"comfort",phonetic:"[ˈkʌmfət]",meaning:"편안함",pos:"n"},
      {word:"average",phonetic:"[ˈævərɪdʒ]",meaning:"평균의",pos:"a"},
      {word:"therefore",phonetic:"[ˈðeəfɔː]",meaning:"그러므로",pos:"ad"},
      {word:"stress",phonetic:"[stres]",meaning:"스트레스",pos:"n"},
      {word:"local",phonetic:"[ˈləʊkl]",meaning:"지역의",pos:"a"},
      {word:"ride",phonetic:"[raɪd]",meaning:"타다",pos:"v"},
      {word:"positive",phonetic:"[ˈpɒzətɪv]",meaning:"긍정적인",pos:"a"},
      {word:"determine",phonetic:"[dɪˈtɜːmɪn]",meaning:"결정하다",pos:"v"},
      {word:"consume",phonetic:"[kənˈsjuːm]",meaning:"소비하다",pos:"v"},
      {word:"involve",phonetic:"[ɪnˈvɒlv]",meaning:"포함하다",pos:"v"},
      {word:"impress",phonetic:"[ɪmˈpres]",meaning:"인상을 주다",pos:"v"},
      {word:"available",phonetic:"[əˈveɪləbl]",meaning:"이용 가능한",pos:"a"},
      {word:"object",phonetic:"[ˈɒbdʒɪkt]",meaning:"물건",pos:"n"},
      {word:"international",phonetic:"[ˌɪntəˈnæʃnəl]",meaning:"국제적인",pos:"a"},
      {word:"ability",phonetic:"[ˈæbɪləti]",meaning:"능력",pos:"n"},
      {word:"encourage",phonetic:"[txt]",meaning:"격려하다",pos:"v"},
      {word:"contain",phonetic:"[kənˈteɪn]",meaning:"포함하다",pos:"v"},
      {word:"benefit",phonetic:"[ˈbenɪfɪt]",meaning:"이익",pos:"n"},
      {word:"affect",phonetic:"[əˈfekt]",meaning:"영향을 미치다",pos:"v"},
      {word:"proper",phonetic:"[ˈprɒpə]",meaning:"적절한",pos:"a"},
      {word:"thus",phonetic:"[ðʌs]",meaning:"그러므로",pos:"ad"},
      {word:"amaze",phonetic:"[əˈmeɪz]",meaning:"놀라게 하다",pos:"v"},
      {word:"participate",phonetic:"[pɑːˈtɪsɪpeɪt]",meaning:"참여하다",pos:"v"},
      {word:"reduce",phonetic:"[rɪˈdjuːs]",meaning:"줄이다",pos:"v"},
      {word:"performance",phonetic:"[pəˈfɔːməns]",meaning:"공연",pos:"n"},
      {word:"decide",phonetic:"[dɪˈsaɪd]",meaning:"결정하다",pos:"v"},
      {word:"level",phonetic:"[ˈlevl]",meaning:"수준",pos:"n"}
    ];

    let words = [];
    let currentTab = 'list';
    let currentRangeIndex = 0; // 0: 전체보기
    let currentFilter = 'all';
    
    let cardIndex = 0;
    let cardWords = [];
    let quizIndex = 0;
    let quizWords = [];
    let quizScore = 0;
    let touchStartX = 0;
    let touchEndX = 0;

    window.onload = function() {
      const savedStatus = JSON.parse(localStorage.getItem('cu_top_status')) || {};
      const savedFavs = JSON.parse(localStorage.getItem('cu_top_favs')) || {};
      
      words = rawWords.map((w, idx) => ({
        ...w,
        id: idx,
        status: savedStatus[idx] || '', 
        fav: !!savedFavs[idx]
      }));

      document.getElementById('sub-title').innerText = `수능 2000 renew (Day 1 - Day 50) · 총 ${words.length}단어`;
      
      buildRangeBar();
      switchTab('list');
      
      // 모바일 스와이프 터치 이벤트 연동
      const elCard = document.getElementById('card-box');
      elCard.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
      elCard.addEventListener('touchend', e => { 
        touchEndX = e.changedTouches[0].screenX; 
        handleSwipe();
      }, false);
    }

    function saveState() {
      const statusObj = {};
      const favsObj = {};
      words.forEach(w => {
        if (w.status) statusObj[w.id] = w.status;
        if (w.fav) favsObj[w.id] = true;
      });
      localStorage.setItem('cu_top_status', JSON.stringify(statusObj));
      localStorage.setItem('cu_top_favs', JSON.stringify(favsObj));
    }

    // 10개 단위 구간 분할 기능
    function buildRangeBar() {
      const container = document.getElementById('range-bar');
      container.innerHTML = '';
      
      const btnAll = document.createElement('button');
      btnAll.className = 'range-btn active';
      btnAll.innerText = '전체 보기';
      btnAll.onclick = () => selectRange(0);
      container.appendChild(btnAll);

      const itemsPerRange = 10;
      const totalRanges = Math.ceil(words.length / itemsPerRange);
      
      for(let i = 1; i <= totalRanges; i++) {
        const start = (i - 1) * itemsPerRange + 1;
        const end = Math.min(i * itemsPerRange, words.length);
        const btn = document.createElement('button');
        btn.className = 'range-btn';
        btn.innerText = `${start}-${end}`;
        btn.onclick = () => selectRange(i);
        container.appendChild(btn);
      }
    }

    function selectRange(index) {
      currentRangeIndex = index;
      document.querySelectorAll('.range-btn').forEach((btn, idx) => {
        if(idx === index) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      
      if (currentTab === 'list') renderList();
      else if (currentTab === 'card') initFlashcards();
      else if (currentTab === 'quiz') startQuiz();
    }

    function getFilteredWords() {
      let result = [...words];
      
      if (currentRangeIndex > 0) {
        const itemsPerRange = 10;
        const startIdx = (currentRangeIndex - 1) * itemsPerRange;
        const endIdx = startIdx + itemsPerRange;
        result = result.slice(startIdx, endIdx);
      }
      
      if (currentTab === 'list') {
        const q = document.getElementById('search-box').value.trim().toLowerCase();
        if (q) {
          result = result.filter(w => w.word.toLowerCase().includes(q) || w.meaning.includes(q));
        }
        if (currentFilter === 'wrong') {
          result = result.filter(w => w.status !== 'known');
        } else if (currentFilter === 'fav') {
          result = result.filter(w => w.fav);
        }
      }
      return result;
    }

    function switchTab(tabName) {
      currentTab = tabName;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        if(btn.innerText === (tabName==='list'?'단어목록':tabName==='card'?'플래시카드':'퀴즈모드')) btn.classList.add('active');
        else btn.classList.remove('active');
      });

      document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('list-controls').style.display = (tabName === 'list') ? 'flex' : 'none';

      if (tabName === 'list') {
        document.getElementById('panel-list').classList.add('active');
        renderList();
      } else if (tabName === 'card') {
        document.getElementById('panel-card').classList.add('active');
        initFlashcards();
      } else if (tabName === 'quiz') {
        document.getElementById('panel-quiz').classList.add('active');
        startQuiz();
      }
    }

    function setFilter(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      if(type==='all') document.getElementById('f-all').classList.add('active');
      if(type==='wrong') document.getElementById('f-wrong').classList.add('active');
      if(type==='fav') document.getElementById('f-fav').classList.add('active');
      renderList();
    }

    function playTTS(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      }
    }

    // --- 단어 목록 기능 ---
    function renderList() {
      const targetBox = document.getElementById('word-list-box');
      targetBox.innerHTML = '';
      const data = getFilteredWords();

      if(data.length === 0) {
        targetBox.innerHTML = `<div class="empty-msg">조건에 부합하는 단어가 없습니다.</div>`;
        return;
      }

      data.forEach(w => {
        const item = document.createElement('div');
        item.className = `word-item ${w.status === 'known' ? 'known' : ''}`;
        item.innerHTML = `
          <button class="icon-btn btn-check ${w.status === 'known'?'active':''}" onclick="toggleKnown(${w.id}, event)">✔</button>
          <div class="word-info">
            <div class="word-top">
              <span class="word-eng">${w.word}</span>
              <span class="word-pos">${w.pos}</span>
              <span class="word-pho">${w.phonetic}</span>
            </div>
            <div class="word-meaning">${w.meaning}</div>
          </div>
          <button class="icon-btn btn-tts" onclick="playTTS('${w.word.replace(/'/g, "\\'")}'), event">🔊</button>
          <button class="icon-btn btn-fav ${w.fav?'active':''}" onclick="toggleFav(${w.id}, event)">★</button>
        `;
        targetBox.appendChild(item);
      });
    }

    function toggleKnown(id, event) {
      if(event) event.stopPropagation();
      words[id].status = (words[id].status === 'known') ? '' : 'known';
      saveState();
      if(currentTab === 'list') renderList();
    }

    function toggleFav(id, event) {
      if(event) event.stopPropagation();
      words[id].fav = !words[id].fav;
      saveState();
      if(currentTab === 'list') renderList();
      else if(currentTab === 'card') {
        const favBtn = document.getElementById('fc-fav-btn');
        if(words[id].fav) favBtn.classList.add('active');
        else favBtn.classList.remove('active');
      }
    }

    // --- 보완된 플래시카드 기능 ---
    function initFlashcards() {
      cardWords = getFilteredWords();
      cardIndex = 0;
      updateCardUI();
    }

    function updateCardUI() {
      const elEng = document.getElementById('fc-english');
      const elPho = document.getElementById('fc-phonetic');
      const elMean = document.getElementById('fc-korean');
      const elHint = document.getElementById('fc-hint-text');
      const elPos = document.getElementById('fc-partofspeech');
      const elCountText = document.getElementById('fc-count-swipe');
      const favBtn = document.getElementById('fc-fav-btn');

      if(cardWords.length === 0) {
        elEng.innerText = "텅 빔";
        elPho.innerText = "";
        elPos.innerText = "-";
        elMean.style.display = "none";
        elHint.innerText = "이 구간에 해당하는 단어가 없습니다.";
        elCountText.innerText = "(0 / 0) Swipe 이동 불가";
        return;
      }

      const w = cardWords[cardIndex];
      elEng.innerText = w.word;
      elPho.innerText = w.phonetic;
      elPos.innerText = w.pos;
      elMean.innerText = w.meaning;
      
      elMean.style.display = "none";
      elHint.style.display = "block";
      elCountText.innerText = `(${cardIndex + 1} / ${cardWords.length}) Swipe 좌우 이동 가능`;
      
      if(w.fav) favBtn.classList.add('active');
      else favBtn.classList.remove('active');

      favBtn.onclick = (e) => toggleFav(w.id, e);
    }

    // 카드 독립 스피커 버튼 전용 함수 (카드 뒤집기 버블링 차단 필수)
    function triggerCardTTS(event) {
      if(event) event.stopPropagation(); 
      if(cardWords.length > 0) {
        playTTS(cardWords[cardIndex].word);
      }
    }

    function revealCard() {
      if(cardWords.length === 0) return;
      const elMean = document.getElementById('fc-korean');
      const elHint = document.getElementById('fc-hint-text');
      
      if(elMean.style.display === "none") {
        elMean.style.display = "block";
        elHint.style.display = "none";
        playTTS(cardWords[cardIndex].word); // 터치 시 최초 1회 자동 재생
      }
    }

    function markCardStatus(status) {
      if(cardWords.length === 0) return;
      const w = cardWords[cardIndex];
      words[w.id].status = status;
      saveState();
      
      // 상태 변경 후 다음 카드로 자동 이동 및 숨김 초기화
      cardIndex++;
      if(cardIndex >= cardWords.length) cardIndex = 0;
      updateCardUI();
    }

    function handleSwipe() {
      const swipethreshold = 50;
      if (touchStartX - touchEndX > swipethreshold) {
        // 왼쪽으로 슬라이드 -> 다음 단어
        cardIndex++;
        if(cardIndex >= cardWords.length) cardIndex = 0;
        updateCardUI();
      }
      if (touchEndX - touchStartX > swipethreshold) {
        // 오른쪽으로 슬라이드 -> 이전 단어
        cardIndex--;
        if(cardIndex < 0) cardIndex = cardWords.length - 1;
        updateCardUI();
      }
    }

    // --- 퀴즈 기능 ---
    function startQuiz() {
      const scopePool = getFilteredWords();
      document.getElementById('quiz-result').style.display = "none";
      
      if (scopePool.length < 4) {
        document.getElementById('quiz-game').style.display = "none";
        document.getElementById('quiz-result').style.display = "flex";
        document.getElementById('res-score').innerText = "학습 불가";
        document.getElementById('res-comment').innerText = "퀴즈를 시작하려면 선택 구간 내에 최소 4개 이상의 단어가 필요합니다.";
        return;
      }

      document.getElementById('quiz-game').style.display = "block";
      quizWords = [...scopePool].sort(() => 0.5 - Math.random()).slice(0, 10);
      quizIndex = 0;
      quizScore = 0;
      
      loadQuizQuestion();
    }

    function loadQuizQuestion() {
      document.getElementById('qz-count').innerText = `문제 ${quizIndex + 1} / ${quizWords.length}`;
      document.getElementById('qz-score-track').innerText = `맞춤: ${quizScore}`;

      const currentQ = quizWords[quizIndex];
      document.getElementById('qz-eng').innerText = currentQ.word;
      document.getElementById('qz-pho').innerText = currentQ.phonetic;

      const box = document.getElementById('qz-options-box');
      box.innerHTML = '';

      const choices = [currentQ.meaning];
      const fallbackPool = words.filter(w => w.meaning !== currentQ.meaning);
      const dummies = fallbackPool.sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.meaning);
      const finalChoices = [...choices, ...dummies].sort(() => 0.5 - Math.random());

      finalChoices.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = m;
        btn.onclick = () => handleChoiceSelection(btn, m, currentQ.meaning);
        box.appendChild(btn);
      });

      playTTS(currentQ.word);
    }

    function handleChoiceSelection(selectedBtn, chosenText, correctText) {
      const optionButtons = document.querySelectorAll('.option-btn');
      optionButtons.forEach(b => b.disabled = true);

      if (chosenText === correctText) {
        selectedBtn.classList.add('correct');
        quizScore++;
      } else {
        selectedBtn.classList.add('wrong');
        optionButtons.forEach(b => {
          if(b.innerText === correctText) b.classList.add('correct');
        });
      }

      setTimeout(() => {
        quizIndex++;
        if(quizIndex < quizWords.length) {
          loadQuizQuestion();
        } else {
          showQuizResults();
        }
      }, 1100);
    }

    function showQuizResults() {
      document.getElementById('quiz-game').style.display = "none";
      const elRes = document.getElementById('quiz-result');
      elRes.style.display = "flex";

      const finalScorePct = Math.round((quizScore / quizWords.length) * 100);
      document.getElementById('res-score').innerText = `${finalScorePct}점`;
      
      let feedbackMsg = "조금 더 분발해봅시다! 💪";
      if(finalScorePct === 100) feedbackMsg = "🥇 완벽합니다! 씨유에탑 마스터 클래스!";
      else if(finalScorePct >= 80) feedbackMsg = "✨ 아주 훌륭합니다. 실력이 대단하네요!";
      else if(finalScorePct >= 50) feedbackMsg = "👍 잘하고 있어요. 조금만 더 연습해봐요!";
      
      document.getElementById('res-comment').innerText = feedbackMsg;
    }
  </script>
</body>
