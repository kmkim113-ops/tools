<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="구약 100일 읽기">
<title>구약 100일 읽기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
html,body{height:100%;background:#0d1a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8f5e0}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.hd{padding:14px 16px 10px;background:#0d1a0a;border-bottom:1px solid #2a4020;position:sticky;top:0;z-index:20}
.hd-top{display:flex;align-items:center;justify-content:space-between}
.badge{font-size:10px;font-weight:700;background:#2d6a1a;color:#fff;padding:3px 9px;border-radius:20px}
.hd h1{font-size:17px;font-weight:700;color:#e8f5e0;margin-left:8px}
.hd-sub{font-size:11px;color:#6a9a50;margin-top:3px}
.progress-bar-wrap{padding:10px 16px;background:#0d1a0a;border-bottom:1px solid #2a4020}
.overall-label{display:flex;justify-content:space-between;font-size:12px;color:#6a9a50;margin-bottom:5px}
.overall-bar{height:8px;background:#1a2e10;border-radius:4px;overflow:hidden}
.overall-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2d6a1a,#7ecf4e);transition:width .5s}
.tabs{display:flex;border-bottom:1px solid #2a4020;background:#0d1a0a;position:sticky;top:97px;z-index:19}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:10px;cursor:pointer;color:#3a5a2a;border-bottom:2px solid transparent;font-weight:600}
.tab.on{color:#7ecf4e;border-bottom-color:#2d6a1a}
.tab-ic{display:block;font-size:15px;margin-bottom:1px}
.sec{padding:12px;display:none}
.sec.on{display:block}
.today-card{background:#111f0a;border:1px solid #3a5a2a;border-radius:16px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.today-card::before{content:'✡';position:absolute;right:12px;top:10px;font-size:48px;opacity:.05;color:#7ecf4e}
.today-day{font-size:11px;color:#6a9a50;font-weight:600;margin-bottom:4px}
.today-range{font-size:20px;font-weight:700;color:#e8f5e0;margin-bottom:6px}
.today-theme{font-size:14px;color:#7ecf4e;font-weight:600;margin-bottom:10px}
.today-summary{font-size:13px;color:#b0d090;line-height:1.7;margin-bottom:10px}
.today-meditation{background:#0d1a0a;border-left:3px solid #2d6a1a;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:12px}
.today-meditation-label{font-size:10px;color:#2d6a1a;font-weight:700;margin-bottom:4px;letter-spacing:0.5px}
.today-meditation-text{font-size:13px;color:#e8f5e0;line-height:1.6}
.check-row{display:flex;gap:8px}
.check-btn-done{flex:1;padding:12px;border-radius:12px;background:#2d6a1a;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.check-btn-done:active{background:#1e4a10}
.check-btn-done.completed{background:#1a3a10;border:1px solid #4a8a30;color:#7ecf4e}
.check-btn-prev{padding:12px 14px;border-radius:12px;background:#111f0a;border:1px solid #3a5a2a;color:#6a9a50;font-size:13px;font-weight:600;cursor:pointer}
.day-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #1a2e10;cursor:pointer;transition:background .15s}
.day-item:last-child{border-bottom:none}
.day-item:active{background:#111f0a}
.day-item.completed .di-day{color:#3a6a2a}
.day-item.completed .di-range{color:#3a6a2a}
.day-item.today-item{background:#111f0a}
.di-check{width:28px;height:28px;border-radius:50%;border:2px solid #3a5a2a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.di-check.done{background:#1a3a10;border-color:#4a8a30;color:#7ecf4e}
.di-check.today-c{background:#2d6a1a;border-color:#7ecf4e;color:#fff}
.di-info{flex:1;min-width:0}
.di-day{font-size:11px;color:#6a9a50;font-weight:600}
.di-range{font-size:13px;font-weight:600;color:#e8f5e0;margin-top:1px}
.di-theme{font-size:11px;color:#4a8a30;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.di-arrow{font-size:16px;color:#3a5a2a}
.section-divider{padding:8px 14px;background:#0d1a0a;font-size:11px;font-weight:700;color:#4a8a30;letter-spacing:0.5px;border-bottom:1px solid #1a2e10;border-top:1px solid #1a2e10}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:#111f0a;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-top:1px solid #3a5a2a}
.modal-handle{width:36px;height:4px;background:#1a2e10;border-radius:2px;margin:0 auto 16px}
.modal-day-badge{font-size:11px;font-weight:700;background:#1a2e10;color:#7ecf4e;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:8px}
.modal-range{font-size:20px;font-weight:700;color:#e8f5e0;margin-bottom:6px}
.modal-theme{font-size:15px;color:#7ecf4e;font-weight:600;margin-bottom:12px}
.modal-section-label{font-size:11px;font-weight:700;color:#4a8a30;letter-spacing:0.5px;margin-bottom:6px;margin-top:14px}
.modal-summary{font-size:14px;color:#b0d090;line-height:1.8}
.modal-meditation{background:#0d1a0a;border-left:3px solid #2d6a1a;border-radius:0 10px 10px 0;padding:12px 14px;margin-top:10px}
.modal-med-label{font-size:10px;color:#2d6a1a;font-weight:700;margin-bottom:5px}
.modal-med-text{font-size:14px;color:#e8f5e0;line-height:1.7}
.modal-check{width:100%;padding:13px;border-radius:12px;background:#2d6a1a;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px}
.modal-check:active{background:#1e4a10}
.modal-check.done{background:#1a3a10;border:1px solid #4a8a30;color:#7ecf4e}
.modal-close{width:100%;padding:10px;border-radius:12px;background:none;border:none;color:#3a5a2a;font-size:13px;cursor:pointer;margin-top:6px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-box{background:#111f0a;border:1px solid #3a5a2a;border-radius:12px;padding:12px}
.stat-label{font-size:10px;color:#3a5a2a;font-weight:600}
.stat-val{font-size:24px;font-weight:700;color:#e8f5e0;margin-top:3px}
.stat-sub{font-size:10px;color:#6a9a50;margin-top:1px}
.prog-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:16px}
.pg-cell{aspect-ratio:1;border-radius:3px;background:#111f0a;border:1px solid #1a2e10;display:flex;align-items:center;justify-content:center;font-size:8px;color:#3a5a2a}
.pg-cell.done{background:#1a3a10;border-color:#4a8a30;color:#7ecf4e}
.pg-cell.today-cell{background:#2d6a1a;border-color:#7ecf4e;color:#fff;font-weight:700}
.pg-cell.future{opacity:.3}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:#2d6a1a;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 메모/주요표현 ── */
.memo-section{background:#0f1a0f;border:1px solid #2a4a2a;border-radius:12px;padding:14px;margin-top:12px}
.memo-section-title{font-size:11px;font-weight:700;color:#4a8a4a;margin-bottom:10px;letter-spacing:0.5px;display:flex;align-items:center;gap:5px}
.memo-list{margin-bottom:10px}
.memo-item{background:#1a2a1a;border-radius:8px;padding:9px 12px;margin-bottom:6px;font-size:13px;color:#a8c8a0;line-height:1.6;position:relative;padding-right:32px}
.memo-item-del{position:absolute;top:7px;right:8px;background:none;border:none;color:#2a4a2a;font-size:15px;cursor:pointer;padding:2px 5px;border-radius:4px}
.memo-item-del:hover{color:#7ecf4e}
.memo-empty{font-size:12px;color:#3a5a3a;text-align:center;padding:8px 0}
.memo-input-row{display:flex;gap:8px}
.memo-input{flex:1;background:#1a2a1a;border:1px solid #2a4a2a;border-radius:8px;padding:9px 11px;font-size:13px;color:#e0f0d8;font-family:inherit;resize:none;outline:none;min-height:56px;line-height:1.6}
.memo-input:focus{border-color:#4a8a4a}
.memo-save-btn{padding:9px 14px;background:#2d6a4f;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;align-self:flex-end;flex-shrink:0}
.memo-save-btn:active{background:#1f4a35}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="hd-top">
      <div style="display:flex;align-items:center">
        <span class="badge">씨유에탑</span>
        <h1>✡ 구약 100일 읽기</h1>
      </div>
      <span style="font-size:11px;color:#6a9a50" id="today-lbl"></span>
    </div>
    <div class="hd-sub" id="hd-sub">오늘의 말씀을 읽어보세요</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="overall-label">
      <span>전체 진행률</span>
      <span id="prog-pct">0 / 100일</span>
    </div>
    <div class="overall-bar"><div class="overall-fill" id="overall-fill" style="width:0%"></div></div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="switchTab('today')"><span class="tab-ic">📖</span>오늘읽기</div>
    <div class="tab" onclick="switchTab('list')"><span class="tab-ic">📋</span>전체목록</div>
    <div class="tab" onclick="switchTab('stats')"><span class="tab-ic">📊</span>기록</div>
  </div>
  <div class="sec on" id="sec-today"></div>
  <div class="sec" id="sec-list"></div>
  <div class="sec" id="sec-stats"></div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PLAN=[
  // ===== 모세오경 (1~25일) =====
  {day:1,range:"창세기 1-3장",theme:"천지창조와 인간의 타락",section:"모세오경",
   summary:"하나님이 6일 동안 세상을 창조하시고 7일째 안식하심. 하나님의 형상으로 창조된 인간, 에덴동산, 선악과, 뱀의 유혹으로 인한 타락과 에덴 추방.",
   meditation:"'하나님이 보시기에 좋았더라.' 창조의 아름다움을 묵상하며, 하나님의 형상으로 지음받은 나의 존귀함을 새겨보세요."},
  {day:2,range:"창세기 4-11장",theme:"죄의 확산과 노아 홍수",section:"모세오경",
   summary:"가인과 아벨, 죄의 계보, 노아의 방주와 홍수 심판, 무지개 언약, 바벨탑 사건과 언어 분산.",
   meditation:"노아는 그 세대에 의인이었습니다. 세상이 타락해도 하나님 앞에 바르게 서는 삶이 가능한가요?"},
  {day:3,range:"창세기 12-15장",theme:"아브라함을 부르신 하나님",section:"모세오경",
   summary:"아브람의 소명 '고향을 떠나라', 이집트 체류, 롯과의 분리, 멜기세덱과의 만남, 횃불 언약 — 아브람의 믿음이 의로 여겨짐.",
   meditation:"하나님은 '갈 바를 알지 못하고' 떠난 아브라함을 인도하셨습니다. 나의 미지의 길에서 하나님을 신뢰하고 있나요?"},
  {day:4,range:"창세기 16-20장",theme:"언약의 확인과 소돔 심판",section:"모세오경",
   summary:"이스마엘 출생, 할례 언약, 세 천사 방문과 이삭 탄생 예고, 소돔과 고모라 심판, 롯의 구출, 아비멜렉 사건.",
   meditation:"아브라함은 소돔을 위해 중보기도 했습니다. 나는 누구를 위해 끈질기게 기도하고 있나요?"},
  {day:5,range:"창세기 21-25장",theme:"이삭과 야곱의 탄생",section:"모세오경",
   summary:"이삭의 출생, 이스마엘 추방, 모리아 산의 시험 — 이삭 번제, 사라의 죽음, 이삭과 리브가의 결혼, 아브라함의 죽음, 에서와 야곱.",
   meditation:"모리아 산에서 아브라함은 가장 소중한 것을 드렸습니다. 내가 하나님께 내어드리지 못하고 있는 것이 있나요?"},
  {day:6,range:"창세기 26-31장",theme:"야곱의 이야기",section:"모세오경",
   summary:"이삭과 아비멜렉, 야곱의 장자권 탈취, 야곱의 꿈 '벧엘', 라반의 집에서 14년, 레아와 라헬, 열두 아들, 야곱의 도주.",
   meditation:"'내가 너와 함께 있어 어디를 가든지 너를 지키리라.' 야곱의 벧엘 경험처럼 일상 속에서 하나님을 만나고 있나요?"},
  {day:7,range:"창세기 32-36장",theme:"야곱이 이스라엘이 되다",section:"모세오경",
   summary:"얍복 나루의 씨름 — 야곱에서 이스라엘로, 에서와의 화해, 세겜 사건, 벧엘 재헌신, 라헬의 죽음과 베냐민 출생, 이삭의 죽음.",
   meditation:"야곱은 하나님과 씨름하며 변화됐습니다. 나는 어떤 씨름을 통해 성장하고 있나요?"},
  {day:8,range:"창세기 37-41장",theme:"요셉의 시련",section:"모세오경",
   summary:"요셉의 꿈, 형들의 질투로 팔림, 애굽 보디발의 집, 보디발 아내의 유혹 — 거절, 감옥, 술 맡은 관원장과 빵 굽는 관원장의 꿈 해석, 바로의 꿈.",
   meditation:"요셉은 억울한 상황에서도 신실했습니다. '이 모든 것이 합력하여 선을 이루리라'는 믿음을 가지고 있나요?"},
  {day:9,range:"창세기 42-50장",theme:"요셉의 회복과 야곱 가족의 이집트 이주",section:"모세오경",
   summary:"형들의 애굽 방문, 베냐민을 데려옴, 요셉의 정체 밝힘 '나는 당신들이 판 요셉이라', 야곱 가족의 이집트 이주, 야곱의 축복, 요셉의 유언.",
   meditation:"요셉은 '당신들이 나를 팔았지만 하나님이 보내셨다'고 했습니다. 내 삶의 고통에도 하나님의 섭리가 있음을 믿나요?"},
  {day:10,range:"출애굽기 1-6장",theme:"모세의 부르심",section:"모세오경",
   summary:"이스라엘의 노예 생활, 모세 출생과 성장, 불타는 떨기나무 — 하나님의 이름 '여호와', 바로 앞에 선 모세, 열 재앙의 시작.",
   meditation:"하나님은 '나는 스스로 있는 자'라고 말씀하셨습니다. 변하지 않으시는 하나님이 오늘 나의 삶에 어떤 의미인가요?"},
  {day:11,range:"출애굽기 7-13장",theme:"열 가지 재앙과 유월절",section:"모세오경",
   summary:"피·개구리·이·파리·가축 죽음·악성 종기·우박·메뚜기·흑암의 재앙, 장자 죽음 재앙, 유월절 제정 — 어린 양의 피로 구원.",
   meditation:"어린 양의 피로 죽음을 면한 유월절은 예수님의 십자가를 예표합니다. 나는 그 피의 은혜 아래 있나요?"},
  {day:12,range:"출애굽기 14-18장",theme:"홍해 기적과 광야 여정",section:"모세오경",
   summary:"홍해를 가르심, 모세의 노래, 마라의 쓴 물, 만나와 메추라기, 반석에서 물, 아말렉 전투, 이드로의 방문과 조언.",
   meditation:"'여호와는 나의 힘이요 노래시며 나의 구원이시로다.' 오늘 내 삶의 광야에서 하나님을 찬양할 이유를 찾아보세요."},
  {day:13,range:"출애굽기 19-24장",theme:"시내산 언약과 십계명",section:"모세오경",
   summary:"시내산 강림, 십계명 선포, 언약법전, 피로 맺은 언약 — '여호와의 말씀대로 행하겠습니다', 모세의 산 위 40일.",
   meditation:"십계명의 첫 계명 '나 외에 다른 신을 네게 두지 말라.' 오늘 나의 삶에서 하나님이 진정한 첫 번째인가요?"},
  {day:14,range:"출애굽기 25-31장",theme:"성막 제작 명령",section:"모세오경",
   summary:"성막 설계 — 법궤·떡상·등잔대·분향단·번제단, 제사장 의복, 아론과 아들들의 위임식, 안식일 규례.",
   meditation:"하나님은 백성 가운데 거하시길 원하셔서 성막을 명하셨습니다. 내 삶이 하나님의 임재의 처소가 되고 있나요?"},

let checked=[];
let notes={};
let currentDay=0;

function save(){
  try{
    localStorage.setItem('ot100_checked',JSON.stringify(checked));
    localStorage.setItem('ot100_notes',JSON.stringify(notes));
    localStorage.setItem('ot100_current',String(currentDay));
  }catch(e){}
}
function load(){
  try{checked=JSON.parse(localStorage.getItem('ot100_checked')||'[]')}catch(e){checked=[]}
  try{notes=JSON.parse(localStorage.getItem('ot100_notes')||'{}')}catch(e){notes={}}
  const c=localStorage.getItem('ot100_current');
  currentDay=c!==null?parseInt(c):0;
}

function getCurrentDay(){ return Math.min(currentDay, 99); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}

function updateHeader(){
  const done=checked.length;
  const pct=Math.round(done/100*100);
  document.getElementById('prog-pct').textContent=`${done} / 100일`;
  document.getElementById('overall-fill').style.width=pct+'%';
  const today=new Date();
  document.getElementById('today-lbl').textContent=`진행 ${getCurrentDay()+1}일차`;
  document.getElementById('hd-sub').textContent=`${pct}% 완료 · 함께 말씀을 읽어요`;
}

function renderToday(){
  const idx=getCurrentDay();
  const plan=PLAN[idx];
  const isDone=checked.includes(idx+1);
  const wrap=document.getElementById('sec-today');
  let nextHtml='';
  if(idx<99){
    const next=PLAN[idx+1];
    nextHtml=`<div style="background:#111f0a;border:1px solid #2a4020;border-radius:12px;padding:12px;margin-top:4px">
      <div style="font-size:10px;color:#3a5a2a;font-weight:600;margin-bottom:4px">다음 읽을 말씀</div>
      <div style="font-size:13px;font-weight:600;color:#b0d090">${next.range}</div>
      <div style="font-size:11px;color:#4a8a30;margin-top:2px">${next.theme}</div>
    </div>`;
  }
  wrap.innerHTML=`
    <div class="today-card">
      <div class="today-day">📅 ${idx+1}일차 · <span style="color:#4a8a30">${plan.section}</span></div>
      <div class="today-range">${plan.range}</div>
      <div class="today-theme">✦ ${plan.theme}</div>
      <div class="today-summary">${plan.summary}</div>
      <div class="today-meditation">
        <div class="today-meditation-label">🙏 묵상 포인트</div>
        <div class="today-meditation-text">${plan.meditation}</div>
      </div>
      <div class="check-row">
        <button class="check-btn-done ${isDone?'completed':''}" onclick="toggleCheck(${idx+1})">
          ${isDone?'✅ 완료됨 (취소하려면 탭)':'📖 읽기 완료'}
        </button>
        ${idx>0?`<button class="check-btn-prev" onclick="openDayModal(${idx})">◀ 어제</button>`:''}
      </div>
    </div>
    ${renderMemoSection(idx+1, 'today')}
    ${nextHtml}
  `;
}

function renderList(){
  const wrap=document.getElementById('sec-list');
  const todayIdx=getCurrentDay();
  const sections=['모세오경','역사서','시가서','선지서','통독 정리'];
  let html='<div style="background:#111f0a;border-radius:14px;overflow:hidden;border:1px solid #2a4020">';
  let lastSection='';
  PLAN.forEach((p,i)=>{
    if(p.section!==lastSection){
      lastSection=p.section;
      html+=`<div class="section-divider">📚 ${p.section}</div>`;
    }
    const isDone=checked.includes(i+1);
    const isToday=i===todayIdx;
    html+=`<div class="day-item ${isDone?'completed':''} ${isToday?'today-item':''}" onclick="openDayModal(${i+1})">
      <div class="di-check ${isDone?'done':isToday?'today-c':''}">${isDone?'✓':isToday?'→':i+1}</div>
      <div class="di-info">
        <div class="di-day">${i+1}일차 ${isToday?'· 오늘':''}</div>
        <div class="di-range">${p.range}</div>
        <div class="di-theme">${p.theme}</div>
      </div>
      <div class="di-arrow">›</div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function renderStats(){
  const done=checked.length;
  const pct=Math.round(done/100*100);
  const todayIdx=getCurrentDay();

  const cells=PLAN.map((p,i)=>{
    const isDone=checked.includes(i+1);
    const isToday=i===todayIdx;
    const isFuture=i>getCurrentDay();
    return `<div class="pg-cell ${isDone?'done':isToday?'today-cell':isFuture?'future':''}" title="${i+1}일">${i+1}</div>`;
  }).join('');

  // 섹션별 통계
  const sectionStats={};
  PLAN.forEach((p,i)=>{
    if(!sectionStats[p.section])sectionStats[p.section]={total:0,done:0};
    sectionStats[p.section].total++;
    if(checked.includes(i+1))sectionStats[p.section].done++;
  });
  let secHtml='';
  Object.entries(sectionStats).forEach(([name,s])=>{
    const sp=Math.round(s.done/s.total*100);
    secHtml+=`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#b0d090">${name}</span><span style="color:#6a9a50">${s.done}/${s.total}일 (${sp}%)</span></div>
      <div style="height:6px;background:#1a2e10;border-radius:3px;overflow:hidden"><div style="height:100%;width:${sp}%;background:#2d6a1a;border-radius:3px"></div></div>
    </div>`;
  });

  document.getElementById('sec-stats').innerHTML=`
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">완료한 날</div><div class="stat-val">${done}</div><div class="stat-sub">/ 100일</div></div>
      <div class="stat-box"><div class="stat-label">달성률</div><div class="stat-val">${pct}%</div><div class="stat-sub">완료</div></div>
      <div class="stat-box"><div class="stat-label">현재 진행</div><div class="stat-val">${getCurrentDay()+1}일</div><div class="stat-sub">째</div></div>
      <div class="stat-box"><div class="stat-label">남은 날</div><div class="stat-val">${100-done}</div><div class="stat-sub">일</div></div>
    </div>
    <div style="font-size:11px;color:#4a8a30;font-weight:600;margin-bottom:8px;letter-spacing:0.5px">📅 100일 진행표</div>
    <div class="prog-grid">${cells}</div>
    <div style="display:flex;gap:12px;font-size:11px;color:#3a5a2a;margin-bottom:16px;flex-wrap:wrap">
      <span>🟩 완료</span><span style="color:#7ecf4e">▪ 오늘</span><span>▫ 진행예정</span>
    </div>
    <div style="font-size:11px;color:#4a8a30;font-weight:600;margin-bottom:8px">📚 섹션별 진행률</div>
    ${secHtml}
    <div style="background:#111f0a;border:1px solid #2a4020;border-radius:12px;padding:14px;text-align:center;margin-top:8px">
      <div style="font-size:28px;margin-bottom:6px">✡</div>
      <div style="font-size:13px;color:#7ecf4e;font-weight:600;margin-bottom:4px">📖 완료 기준 진행 중</div>
      <div style="font-size:12px;color:#3a5a2a">완료 버튼을 누르면 다음 날로 넘어갑니다</div>
      
    </div>
  `;
}

function getEndDate(){
  if(!startDate)return '';
  const s=new Date(startDate.replace(/-/g,'/'));
  s.setDate(s.getDate()+99);
  return s.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
}

function resetStart(){
  if(!confirm('시작일을 오늘로 초기화할까요?\n체크 기록은 유지됩니다.'))return;
  startDate=getToday();save();
  renderToday();renderList();renderStats();updateHeader();
  showToast('시작일이 오늘로 변경됐어요');
}

function toggleCheck(day){
  if(checked.includes(day)){
    checked=checked.filter(d=>d!==day);
    if(day-1<currentDay+1) currentDay=Math.max(0,day-1);
    showToast(`${day}일차 체크 해제됐어요`);
  } else {
    checked.push(day);
    if(day-1>=currentDay) currentDay=Math.min(day,99);
    showToast(`🙏 ${day}일차 완료! 말씀 읽으셨군요`);
  }
  save();renderAll();
}

function openDayModal(day){
  const p=PLAN[day-1];if(!p)return;
  const isDone=checked.includes(day);
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-day-badge">📅 ${day}일차 · ${p.section}</div>
    <div class="modal-range">${p.range}</div>
    <div class="modal-theme">✦ ${p.theme}</div>
    <div class="modal-section-label">📖 핵심 내용</div>
    <div class="modal-summary">${p.summary}</div>
    <div class="modal-meditation">
      <div class="modal-med-label">🙏 묵상 포인트</div>
      <div class="modal-med-text">${p.meditation}</div>
    </div>
    ${renderMemoSection(day, 'modal')}
    <button class="modal-check ${isDone?'done':''}" onclick="toggleCheck(${day});closeModal2()">
      ${isDone?'✅ 완료됨 (취소하려면 탭)':'📖 읽기 완료 체크'}
    </button>
    <button class="modal-close" onclick="closeModal2()">닫기</button>
  `;
  document.getElementById('modal-bg').classList.add('on');
}

function closeModal(e){if(e&&e.target!==document.getElementById('modal-bg'))return;closeModal2();}
function closeModal2(){document.getElementById('modal-bg').classList.remove('on');}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['today','list','stats'][i]===tab));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+tab).classList.add('on');
  if(tab==='list')renderList();
  if(tab==='stats')renderStats();
}

function renderAll(){
  updateHeader();renderToday();
  const idx=[...document.querySelectorAll('.tab')].findIndex(t=>t.classList.contains('on'));
  if(idx===1)renderList();
  if(idx===2)renderStats();
}


function renderMemoSection(day, context){
  const dayNotes=notes[day]||[];
  const noteHtml=dayNotes.length
    ?dayNotes.map((n,i)=>`<div class="memo-item">${n}<button class="memo-item-del" onclick="deleteNote(${day},${i},'${context}')">×</button></div>`).join('')
    :'<div class="memo-empty">주요 표현이나 묵상을 기록해보세요</div>';
  return `<div class="memo-section">
    <div class="memo-section-title">✏️ 주요 표현 & 메모</div>
    <div class="memo-list" id="memo-list-${context}">${noteHtml}</div>
    <div class="memo-input-row">
      <textarea class="memo-input" id="memo-input-${context}" placeholder="기억하고 싶은 구절이나 표현을 적어보세요…" rows="2"></textarea>
      <button class="memo-save-btn" onclick="saveNote(${day},'${context}')">저장</button>
    </div>
  </div>`;
}

function saveNote(day, context){
  const el=document.getElementById('memo-input-'+context);
  const txt=el.value.trim(); if(!txt)return;
  if(!notes[day])notes[day]=[];
  notes[day].push(txt);
  save(); el.value='';
  if(context==='today') renderToday(); else openDayModal(day);
}

function deleteNote(day, idx, context){
  if(!notes[day])return;
  notes[day].splice(idx,1);
  save();
  if(context==='today') renderToday(); else openDayModal(day);
}

load();renderAll();
</script>
</body>
</html>
