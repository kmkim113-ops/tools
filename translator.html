<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KO ↔ EN — Language Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #0f0e0d;
    --paper:     #f7f5f0;
    --mid:       #e8e4dc;
    --muted:     #9a9388;
    --accent:    #1a4fff;
    --accent-lt: #e8eeff;
    --ko:        #c8350f;
    --ko-lt:     #fff0ec;
    --en:        #0a7a45;
    --en-lt:     #eafaf2;
    --red:       #d92b2b;
    --gold:      #b97a00;
    --gold-lt:   #fff8e6;
    --radius:    14px;
    --shadow:    0 4px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.06);
  }

  html { font-size: 16px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 28px 40px 0;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: -.5px;
    line-height: 1;
    color: var(--ink);
  }
  .logo em { font-style: italic; color: var(--accent); }
  .tagline {
    font-size: .78rem;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    border-left: 1px solid var(--mid);
    padding-left: 16px;
  }
  .header-right { margin-left: auto; }
  .btn-notebook {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--gold);
    background: var(--gold-lt);
    color: var(--gold);
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all .18s;
  }
  .btn-notebook:hover { background: var(--gold); color: #fff; }
  .nb-count {
    background: var(--gold);
    color: #fff;
    border-radius: 999px;
    padding: 1px 7px;
    font-size: .7rem;
    font-weight: 700;
    min-width: 18px;
    text-align: center;
  }
  .btn-notebook:hover .nb-count { background: #fff; color: var(--gold); }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 28px 40px 48px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── API Key Bar ── */
  .api-bar {
    background: #fff;
    border: 1.5px solid var(--mid);
    border-radius: var(--radius);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .api-bar label {
    font-size: .78rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    white-space: nowrap;
  }
  .api-input-wrap { flex: 1; display: flex; gap: 8px; align-items: center; }
  #api-key-input {
    flex: 1;
    border: 1.5px solid var(--mid);
    border-radius: 8px;
    padding: 7px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    color: var(--ink);
    background: var(--paper);
    outline: none;
    transition: border-color .15s;
  }
  #api-key-input:focus { border-color: var(--accent); }
  .btn-eye {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--mid);
    background: transparent;
    cursor: pointer;
    font-size: .9rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: all .15s;
    flex-shrink: 0;
  }
  .btn-eye:hover { background: var(--mid); }
  .api-status { font-size: .72rem; white-space: nowrap; }
  .api-status.ok { color: var(--en); }
  .api-status.empty { color: var(--muted); }

  /* ── Mode Pills ── */
  .mode-bar { display: flex; gap: 8px; align-items: center; }
  .mode-label { font-size: .75rem; color: var(--muted); font-weight: 500; margin-right: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .pill {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--mid);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all .18s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Cards Row ── */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }

  .card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--mid);
  }
  .card-lang {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-ko { background: var(--ko); }
  .dot-en { background: var(--en); }
  .card-actions { display: flex; gap: 6px; }

  .btn-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1.5px solid var(--mid);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem;
    color: var(--muted);
    transition: all .15s;
  }
  .btn-icon:hover { background: var(--mid); color: var(--ink); border-color: transparent; }
  .btn-icon:active { transform: scale(.93); }
  .btn-save-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1.5px solid var(--gold);
    background: var(--gold-lt);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem;
    color: var(--gold);
    transition: all .15s;
  }
  .btn-save-icon:hover { background: var(--gold); color: #fff; border-color: transparent; }
  .btn-save-icon:active { transform: scale(.93); }

  textarea {
    width: 100%;
    min-height: 180px;
    padding: 18px;
    border: none;
    resize: vertical;
    font-family: 'Inter', sans-serif;
    font-size: .98rem;
    line-height: 1.7;
    color: var(--ink);
    background: transparent;
    outline: none;
  }
  textarea::placeholder { color: var(--muted); }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    border-top: 1px solid var(--mid);
    background: #fafafa;
  }
  .char-count { font-size: .72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* ── Output card ── */
  .output-card .card-header { background: #fafafa; }
  .output-body {
    padding: 18px;
    min-height: 180px;
    font-size: .98rem;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-body.empty { color: var(--muted); font-style: italic; }
  .output-body.loading { display: flex; align-items: flex-start; gap: 8px; color: var(--muted); }

  /* ── Spinner ── */
  .spinner {
    width: 18px; height: 18px; margin-top: 3px;
    border: 2px solid var(--mid);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Convert button ── */
  .convert-row { display: flex; justify-content: center; align-items: center; gap: 12px; }
  .btn-convert {
    padding: 13px 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: .92rem;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 16px rgba(26,79,255,.3);
    transition: all .18s;
  }
  .btn-convert:hover { background: #0f38d4; box-shadow: 0 6px 20px rgba(26,79,255,.4); transform: translateY(-1px); }
  .btn-convert:active { transform: translateY(0); }
  .btn-convert:disabled { background: var(--mid); box-shadow: none; cursor: not-allowed; color: var(--muted); transform: none; }
  .btn-clear {
    padding: 13px 22px;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--mid);
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: .88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* ── Mode badge ── */
  .mode-badge {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .badge-ko { background: var(--ko-lt); color: var(--ko); }
  .badge-en { background: var(--en-lt); color: var(--en); }
  .badge-auto { background: var(--accent-lt); color: var(--accent); }

  /* ── Error ── */
  .error-msg {
    display: none;
    background: #fff0f0;
    border: 1px solid #ffc5c5;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: .85rem;
    color: var(--red);
  }
  .error-msg.visible { display: block; }

  /* ── Tips ── */
  .tips { display: flex; gap: 12px; flex-wrap: wrap; }
  .tip {
    background: #fff;
    border: 1px solid var(--mid);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: .78rem;
    color: var(--muted);
    display: flex; align-items: flex-start; gap: 8px;
    flex: 1; min-width: 200px;
  }
  .tip-icon { font-size: 1rem; flex-shrink: 0; }
  .tip strong { color: var(--ink); display: block; margin-bottom: 2px; font-size: .8rem; }

  /* ══════════════════════════════
     NOTEBOOK PANEL (DRAWER)
  ══════════════════════════════ */
  .nb-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    z-index: 100;
    backdrop-filter: blur(2px);
  }
  .nb-overlay.open { display: block; }

  .nb-panel {
    position: fixed;
    top: 0; right: -480px;
    width: 460px; max-width: 100vw;
    height: 100vh;
    background: #fff;
    box-shadow: -8px 0 40px rgba(0,0,0,.15);
    z-index: 101;
    display: flex;
    flex-direction: column;
    transition: right .3s cubic-bezier(.4,0,.2,1);
  }
  .nb-panel.open { right: 0; }

  .nb-head {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--mid);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--gold-lt);
  }
  .nb-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .nb-toolbar {
    padding: 12px 16px;
    border-bottom: 1px solid var(--mid);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .nb-search {
    flex: 1;
    min-width: 120px;
    border: 1.5px solid var(--mid);
    border-radius: 8px;
    padding: 7px 12px;
    font-family: 'Inter', sans-serif;
    font-size: .84rem;
    outline: none;
    transition: border-color .15s;
  }
  .nb-search:focus { border-color: var(--accent); }
  .nb-filter {
    padding: 7px 12px;
    border: 1.5px solid var(--mid);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    color: var(--ink);
    background: #fff;
    outline: none;
    cursor: pointer;
  }
  .btn-export {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--en);
    background: var(--en-lt);
    color: var(--en);
    font-family: 'Inter', sans-serif;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-export:hover { background: var(--en); color: #fff; }

  .nb-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .nb-empty {
    text-align: center;
    color: var(--muted);
    font-size: .88rem;
    padding: 48px 20px;
    font-style: italic;
  }

  /* ── Notebook card ── */
  .nb-card {
    background: var(--paper);
    border: 1.5px solid var(--mid);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    position: relative;
  }
  .nb-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(26,79,255,.1); }
  .nb-card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .7rem;
    color: var(--muted);
  }
  .nb-card-type {
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: .04em;
  }
  .type-ko { background: var(--ko-lt); color: var(--ko); }
  .type-en { background: var(--en-lt); color: var(--en); }
  .nb-card-date { margin-left: auto; }
  .nb-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .nb-card-col { display: flex; flex-direction: column; gap: 3px; }
  .nb-col-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .nb-col-text {
    font-size: .84rem;
    line-height: 1.5;
    color: var(--ink);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .nb-card-del {
    position: absolute;
    top: 10px; right: 10px;
    width: 24px; height: 24px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem;
    opacity: 0;
    transition: all .15s;
  }
  .nb-card:hover .nb-card-del { opacity: 1; }
  .nb-card-del:hover { background: #fee; color: var(--red); }

  /* ── Detail modal ── */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    backdrop-filter: blur(3px);
    align-items: center;
    justify-content: center;
  }
  .detail-overlay.open { display: flex; }
  .detail-box {
    background: #fff;
    border-radius: 18px;
    padding: 28px;
    width: 90vw;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .detail-header { display: flex; align-items: center; justify-content: space-between; }
  .detail-type {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .05em;
  }
  .detail-date { font-size: .75rem; color: var(--muted); }
  .detail-section { display: flex; flex-direction: column; gap: 6px; }
  .detail-label {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
  }
  .detail-text {
    background: var(--paper);
    border-radius: 10px;
    padding: 14px;
    font-size: .95rem;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-detail {
    padding: 9px 20px;
    border-radius: 999px;
    border: 1.5px solid var(--mid);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: .84rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
  }
  .btn-detail:hover { border-color: var(--accent); color: var(--accent); }
  .btn-detail-primary {
    padding: 9px 20px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: .84rem;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    transition: all .15s;
  }
  .btn-detail-primary:hover { background: #0f38d4; }

  /* ── Memo input in detail ── */
  .detail-memo {
    width: 100%;
    border: 1.5px solid var(--mid);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: .88rem;
    line-height: 1.6;
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 70px;
    transition: border-color .15s;
  }
  .detail-memo:focus { border-color: var(--accent); }

  /* ── Save toast ── */
  .save-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: .85rem;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all .3s;
    z-index: 300;
    white-space: nowrap;
  }
  .save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Stats bar ── */
  .nb-stats {
    padding: 8px 16px;
    border-top: 1px solid var(--mid);
    display: flex;
    gap: 16px;
    font-size: .72rem;
    color: var(--muted);
    background: #fafafa;
  }
  .stat-item { display: flex; align-items: center; gap: 4px; }
  .stat-num { font-weight: 700; color: var(--ink); font-family: 'JetBrains Mono', monospace; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    header { padding: 20px 20px 0; }
    main { padding: 20px 20px 40px; }
    .cards { grid-template-columns: 1fr; }
    .tagline { display: none; }
    .logo { font-size: 1.6rem; }
    .nb-panel { width: 100vw; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Lang<em>Studio</em></div>
  <div class="tagline">Korean ↔ American English</div>
  <div class="header-right">
    <button class="btn-notebook" onclick="openNotebook()">
      📓 학습 노트 <span class="nb-count" id="nb-count">0</span>
    </button>
  </div>
</header>

<main>

  <!-- API Key -->
  <div class="api-bar">
    <label>🔑 API Key</label>
    <div class="api-input-wrap">
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." oninput="updateApiStatus()" />
      <button class="btn-eye" onclick="toggleApiVisibility()">👁</button>
    </div>
    <span class="api-status empty" id="api-status">미입력</span>
  </div>

  <!-- Mode Bar -->
  <div class="mode-bar">
    <span class="mode-label">모드</span>
    <button class="pill active" data-mode="auto" onclick="setMode('auto')">🔍 자동 감지</button>
    <button class="pill" data-mode="ko" onclick="setMode('ko')">🇰🇷 한→영 번역</button>
    <button class="pill" data-mode="en" onclick="setMode('en')">🇺🇸 영어 교정</button>
  </div>

  <!-- Cards -->
  <div class="cards">

    <!-- Input Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-lang">
          <div class="dot dot-ko"></div>
          입력
        </div>
        <div class="card-actions">
          <button class="btn-icon" title="붙여넣기" onclick="pasteInput()">📋</button>
          <button class="btn-icon" title="지우기" onclick="clearInput()">✕</button>
        </div>
      </div>
      <textarea id="input-text"
        placeholder="한국어 또는 영어를 입력하세요...&#10;&#10;예) 나는 어제 친구들이랑 밥 먹었어&#10;예) I have went to school yesterday"
        oninput="updateCount()"
      ></textarea>
      <div class="card-footer">
        <span class="char-count" id="char-count">0자</span>
        <span style="font-size:.72rem;color:var(--muted);">Shift+Enter 줄바꿈</span>
      </div>
    </div>

    <!-- Output Card -->
    <div class="card output-card">
      <div class="card-header">
        <div class="card-lang">
          <div class="dot dot-en"></div>
          결과
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="mode-badge badge-auto" id="mode-badge">자동</span>
          <div class="card-actions">
            <button class="btn-icon" title="복사" onclick="copyOutput()">📄</button>
            <button class="btn-save-icon" title="노트에 저장" onclick="saveEntry()">⭐</button>
          </div>
        </div>
      </div>
      <div class="output-body empty" id="output-body">결과가 여기에 나타납니다.</div>
      <div class="card-footer">
        <span class="char-count" id="out-count">—</span>
        <span id="copy-toast" style="font-size:.72rem;color:var(--en);opacity:0;transition:opacity .3s;">복사됨 ✓</span>
      </div>
    </div>

  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Action Row -->
  <div class="convert-row">
    <button class="btn-clear" onclick="clearAll()">전체 지우기</button>
    <button class="btn-convert" id="btn-convert" onclick="convert()">
      <span>✦</span> 변환하기
    </button>
  </div>

  <!-- Tips -->
  <div class="tips">
    <div class="tip">
      <span class="tip-icon">🇰🇷</span>
      <div><strong>한→영 번역</strong>한국어를 입력하면 미국식 자연스러운 표현으로 번역해 드립니다.</div>
    </div>
    <div class="tip">
      <span class="tip-icon">🇺🇸</span>
      <div><strong>영어 교정</strong>영어를 입력하면 어휘·문법·문장 구조를 미국식으로 교정합니다.</div>
    </div>
    <div class="tip">
      <span class="tip-icon">⭐</span>
      <div><strong>학습 노트</strong>결과 카드의 ⭐ 버튼으로 저장하고 반복 학습하세요.</div>
    </div>
  </div>

</main>

<!-- ══ NOTEBOOK DRAWER ══ -->
<div class="nb-overlay" id="nb-overlay" onclick="closeNotebook()"></div>
<div class="nb-panel" id="nb-panel">
  <div class="nb-head">
    <div class="nb-title">📓 학습 노트</div>
    <button class="btn-icon" onclick="closeNotebook()" style="border-color:var(--gold);color:var(--gold);">✕</button>
  </div>
  <div class="nb-toolbar">
    <input class="nb-search" type="text" placeholder="검색..." oninput="renderNotebook()" id="nb-search">
    <select class="nb-filter" id="nb-filter" onchange="renderNotebook()">
      <option value="all">전체</option>
      <option value="ko">한→영</option>
      <option value="en">영어 교정</option>
    </select>
    <button class="btn-export" onclick="exportCSV()">⬇ CSV 내보내기</button>
  </div>
  <div class="nb-list" id="nb-list">
    <div class="nb-empty">저장된 항목이 없습니다.<br>결과 카드의 ⭐ 버튼으로 저장하세요.</div>
  </div>
  <div class="nb-stats" id="nb-stats">
    <span class="stat-item">총 <span class="stat-num" id="stat-total">0</span>개</span>
    <span class="stat-item">한→영 <span class="stat-num" id="stat-ko">0</span></span>
    <span class="stat-item">교정 <span class="stat-num" id="stat-en">0</span></span>
  </div>
</div>

<!-- ══ DETAIL MODAL ══ -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detail-box">
    <div class="detail-header">
      <span class="detail-type" id="detail-type"></span>
      <span class="detail-date" id="detail-date"></span>
    </div>
    <div class="detail-section">
      <div class="detail-label" id="detail-orig-label">원문</div>
      <div class="detail-text" id="detail-orig"></div>
    </div>
    <div class="detail-section">
      <div class="detail-label">결과</div>
      <div class="detail-text" id="detail-result"></div>
    </div>
    <div class="detail-section">
      <div class="detail-label">📝 메모</div>
      <textarea class="detail-memo" id="detail-memo" placeholder="나만의 메모를 남겨보세요..."></textarea>
    </div>
    <div class="detail-actions">
      <button class="btn-detail" onclick="closeDetail()">닫기</button>
      <button class="btn-detail" onclick="copyDetailResult()">📄 결과 복사</button>
      <button class="btn-detail" onclick="loadToEditor()">↩ 편집기로 불러오기</button>
      <button class="btn-detail-primary" onclick="saveMemo()">메모 저장</button>
    </div>
  </div>
</div>

<!-- ══ SAVE TOAST ══ -->
<div class="save-toast" id="save-toast"></div>

<script>
  /* ─── State ─── */
  let currentMode = 'auto';
  let lastDetectedMode = 'auto';
  let currentDetailId = null;

  const STORAGE_KEY = 'langstudio_notes';

  function getNotes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }
  function setNotes(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

  /* ─── API Key ─── */
  function updateApiStatus() {
    const key = document.getElementById('api-key-input').value.trim();
    const el = document.getElementById('api-status');
    if (key.startsWith('sk-ant-')) { el.textContent = '✓ 입력됨'; el.className = 'api-status ok'; }
    else if (key.length > 0) { el.textContent = '형식 확인'; el.className = 'api-status empty'; }
    else { el.textContent = '미입력'; el.className = 'api-status empty'; }
  }
  function toggleApiVisibility() {
    const inp = document.getElementById('api-key-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  /* ─── Mode ─── */
  function setMode(m) {
    currentMode = m;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.mode === m));
    const badge = document.getElementById('mode-badge');
    if (m === 'ko') { badge.textContent = '한→영'; badge.className = 'mode-badge badge-ko'; lastDetectedMode = 'ko'; }
    else if (m === 'en') { badge.textContent = '영어 교정'; badge.className = 'mode-badge badge-en'; lastDetectedMode = 'en'; }
    else { badge.textContent = '자동'; badge.className = 'mode-badge badge-auto'; }
  }

  function updateCount() {
    document.getElementById('char-count').textContent = document.getElementById('input-text').value.length + '자';
  }
  function clearInput() { document.getElementById('input-text').value = ''; updateCount(); }
  function clearAll() {
    clearInput();
    const ob = document.getElementById('output-body');
    ob.textContent = '결과가 여기에 나타납니다.';
    ob.className = 'output-body empty';
    document.getElementById('out-count').textContent = '—';
    hideError();
  }
  async function pasteInput() {
    try {
      const t = await navigator.clipboard.readText();
      document.getElementById('input-text').value = t;
      updateCount();
    } catch { alert('클립보드 접근 권한이 필요합니다.'); }
  }
  function copyOutput() {
    const text = document.getElementById('output-body').textContent;
    if (!text || text === '결과가 여기에 나타납니다.') return;
    navigator.clipboard.writeText(text).then(() => {
      const t = document.getElementById('copy-toast');
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 1800);
    });
  }
  function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.classList.add('visible'); }
  function hideError() { document.getElementById('error-msg').classList.remove('visible'); }

  /* ─── Save toast ─── */
  function showToast(msg) {
    const t = document.getElementById('save-toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  /* ─── Save entry ─── */
  function saveEntry() {
    const input = document.getElementById('input-text').value.trim();
    const output = document.getElementById('output-body').textContent.trim();
    if (!output || output === '결과가 여기에 나타납니다.') { showToast('⚠️ 저장할 결과가 없습니다.'); return; }

    const notes = getNotes();
    const entry = {
      id: Date.now().toString(),
      type: lastDetectedMode === 'ko' ? 'ko' : 'en',
      input,
      output,
      memo: '',
      date: new Date().toISOString()
    };
    notes.unshift(entry);
    setNotes(notes);
    updateNbCount();
    showToast('⭐ 학습 노트에 저장되었습니다!');
  }

  /* ─── Count badge ─── */
  function updateNbCount() {
    const n = getNotes().length;
    document.getElementById('nb-count').textContent = n;
  }

  /* ─── Notebook panel ─── */
  function openNotebook() {
    document.getElementById('nb-overlay').classList.add('open');
    document.getElementById('nb-panel').classList.add('open');
    renderNotebook();
  }
  function closeNotebook() {
    document.getElementById('nb-overlay').classList.remove('open');
    document.getElementById('nb-panel').classList.remove('open');
  }

  function renderNotebook() {
    const notes = getNotes();
    const search = document.getElementById('nb-search').value.toLowerCase();
    const filter = document.getElementById('nb-filter').value;

    let filtered = notes.filter(n => {
      const matchType = filter === 'all' || n.type === filter;
      const matchSearch = !search ||
        n.input.toLowerCase().includes(search) ||
        n.output.toLowerCase().includes(search) ||
        (n.memo || '').toLowerCase().includes(search);
      return matchType && matchSearch;
    });

    // Stats
    document.getElementById('stat-total').textContent = notes.length;
    document.getElementById('stat-ko').textContent = notes.filter(n => n.type === 'ko').length;
    document.getElementById('stat-en').textContent = notes.filter(n => n.type === 'en').length;

    const list = document.getElementById('nb-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="nb-empty">검색 결과가 없습니다.</div>';
      return;
    }

    list.innerHTML = filtered.map(n => {
      const typeLabel = n.type === 'ko' ? '한→영' : '영어 교정';
      const typeClass = n.type === 'ko' ? 'type-ko' : 'type-en';
      const origLabel = n.type === 'ko' ? '한국어 원문' : '원본 영어';
      const d = new Date(n.date);
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `
        <div class="nb-card" onclick="openDetail('${n.id}')">
          <div class="nb-card-meta">
            <span class="nb-card-type ${typeClass}">${typeLabel}</span>
            ${n.memo ? '<span title="메모 있음">📝</span>' : ''}
            <span class="nb-card-date">${dateStr}</span>
          </div>
          <div class="nb-card-body">
            <div class="nb-card-col">
              <div class="nb-col-label">${origLabel}</div>
              <div class="nb-col-text">${escHtml(n.input)}</div>
            </div>
            <div class="nb-card-col">
              <div class="nb-col-label">결과</div>
              <div class="nb-col-text">${escHtml(n.output)}</div>
            </div>
          </div>
          <button class="nb-card-del" onclick="deleteEntry(event,'${n.id}')">🗑</button>
        </div>`;
    }).join('');
  }

  function deleteEntry(e, id) {
    e.stopPropagation();
    if (!confirm('삭제할까요?')) return;
    const notes = getNotes().filter(n => n.id !== id);
    setNotes(notes);
    updateNbCount();
    renderNotebook();
    showToast('🗑 삭제되었습니다.');
  }

  /* ─── Detail modal ─── */
  function openDetail(id) {
    const note = getNotes().find(n => n.id === id);
    if (!note) return;
    currentDetailId = id;

    const typeLabel = note.type === 'ko' ? '한→영 번역' : '영어 교정';
    const typeClass = note.type === 'ko' ? 'type-ko' : 'type-en';
    const origLabel = note.type === 'ko' ? '한국어 원문' : '원본 영어';
    const d = new Date(note.date);

    document.getElementById('detail-type').textContent = typeLabel;
    document.getElementById('detail-type').className = `detail-type ${typeClass}`;
    document.getElementById('detail-date').textContent = d.toLocaleString('ko-KR');
    document.getElementById('detail-orig-label').textContent = origLabel;
    document.getElementById('detail-orig').textContent = note.input;
    document.getElementById('detail-result').textContent = note.output;
    document.getElementById('detail-memo').value = note.memo || '';

    document.getElementById('detail-overlay').classList.add('open');
  }

  function closeDetail(e) {
    if (e && e.target !== document.getElementById('detail-overlay')) return;
    document.getElementById('detail-overlay').classList.remove('open');
    currentDetailId = null;
  }

  function saveMemo() {
    if (!currentDetailId) return;
    const notes = getNotes();
    const idx = notes.findIndex(n => n.id === currentDetailId);
    if (idx === -1) return;
    notes[idx].memo = document.getElementById('detail-memo').value;
    setNotes(notes);
    document.getElementById('detail-overlay').classList.remove('open');
    renderNotebook();
    showToast('📝 메모가 저장되었습니다!');
  }

  function copyDetailResult() {
    const text = document.getElementById('detail-result').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('📄 복사되었습니다!'));
  }

  function loadToEditor() {
    const note = getNotes().find(n => n.id === currentDetailId);
    if (!note) return;
    document.getElementById('input-text').value = note.input;
    updateCount();
    document.getElementById('detail-overlay').classList.remove('open');
    closeNotebook();
    showToast('↩ 편집기로 불러왔습니다.');
  }

  /* ─── Export CSV ─── */
  function exportCSV() {
    const notes = getNotes();
    if (notes.length === 0) { showToast('⚠️ 저장된 항목이 없습니다.'); return; }
    const header = '날짜,타입,원문,결과,메모';
    const rows = notes.map(n => [
      new Date(n.date).toLocaleString('ko-KR'),
      n.type === 'ko' ? '한→영' : '영어교정',
      '"' + n.input.replace(/"/g,'""') + '"',
      '"' + n.output.replace(/"/g,'""') + '"',
      '"' + (n.memo||'').replace(/"/g,'""') + '"'
    ].join(','));
    const csv = '\uFEFF' + [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `langstudio_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('⬇ CSV 파일 다운로드 시작!');
  }

  /* ─── Helpers ─── */
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ─── Build prompt ─── */
  function buildPrompt(text, mode) {
    const lang = detectLang(text);
    let effectiveMode = mode === 'auto' ? (lang === 'ko' ? 'ko' : 'en') : mode;
    lastDetectedMode = effectiveMode;

    if (effectiveMode === 'ko') {
      return `You are a professional Korean-to-English translator specializing in natural, everyday American English.

Task: Translate the following Korean text into natural, idiomatic American English.

Rules:
- Use casual, natural American expressions (not British English)
- Capture the tone and nuance of the original
- Avoid overly literal or stiff translations
- Output ONLY the English translation, nothing else

Korean text:
${text}`;
    } else {
      return `You are a professional American English editor and language coach.

Task: Correct and improve the following English text so it sounds natural to native American English speakers.

Rules:
- Fix grammar, vocabulary, spelling, and sentence structure errors
- Improve word choice to sound more natural and idiomatic (American style)
- Preserve the original meaning and intent
- If the text is already correct, write it as-is with a note "✓ Looks great!"
- Output ONLY the corrected English text, nothing else

English text:
${text}`;
    }
  }

  function detectLang(text) {
    const k = (text.match(/[\uAC00-\uD7A3\u1100-\u11FF\u3130-\u318F]/g) || []).length;
    return k > text.length * 0.1 ? 'ko' : 'en';
  }

  /* ─── Convert ─── */
  async function convert() {
    hideError();
    const input = document.getElementById('input-text').value.trim();
    if (!input) { showError('텍스트를 입력해 주세요.'); return; }

    const apiKey = document.getElementById('api-key-input').value.trim();
    if (!apiKey) { showError('API 키를 입력해 주세요. (sk-ant-api03-...)'); return; }

    const btn = document.getElementById('btn-convert');
    const ob = document.getElementById('output-body');

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="border-top-color:#fff"></div> 변환 중...';
    ob.className = 'output-body loading';
    ob.innerHTML = '<div class="spinner"></div><span>AI가 처리하고 있습니다…</span>';
    document.getElementById('out-count').textContent = '—';

    if (currentMode === 'auto') {
      const lang = detectLang(input);
      const badge = document.getElementById('mode-badge');
      if (lang === 'ko') { badge.textContent = '한→영 감지됨'; badge.className = 'mode-badge badge-ko'; }
      else { badge.textContent = '영어 교정 감지됨'; badge.className = 'mode-badge badge-en'; }
    }

    try {
      const prompt = buildPrompt(input, currentMode);
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const result = data.content?.map(b => b.text || '').join('').trim();
      if (!result) throw new Error('응답이 비어 있습니다.');

      ob.textContent = result;
      ob.className = 'output-body';
      document.getElementById('out-count').textContent = result.length + '자';

    } catch (e) {
      ob.textContent = '결과가 여기에 나타납니다.';
      ob.className = 'output-body empty';
      showError('오류: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span>✦</span> 변환하기';
    }
  }

  /* ─── Init ─── */
  document.getElementById('input-text').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') convert();
  });
  updateNbCount();
</script>
</body>
</html>
